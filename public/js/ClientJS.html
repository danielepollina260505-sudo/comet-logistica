            '<td>'+esc(r['Posizione Rimorchio']||'')+'</td>'+
            '<td>'+esc(r['Autista Carico']||'')+'</td>'+
            '<td>'+esc(r['Autista Giacenza']||'')+'</td>'+
            '<td>'+esc(r['Autista Scarico']||'')+'</td>'+
          '</tr>';
        }).join('');
      }catch(e){}
      return Promise.resolve();
    };

    /* ---- Attività autista ---- */
    app.autistiRefresh = function(){
      var sel = q("sel-autista");
      var name = sel ? String(sel.value||"").trim() : "";
      // Aggiorna sempre la tabella assegnazioni dai dati in cache
      app.autistiRefreshAssignments();
      if(!name){
        var tb2 = q("table-autista-activity") ? q("table-autista-activity").querySelector("tbody") : null;
        if(tb2) tb2.innerHTML="";
        return;
      }
      google.script.run
        .withSuccessHandler(function(res){
          var tbody = q("table-autista-activity") ? q("table-autista-activity").querySelector("tbody") : null;
          if(!tbody) return;
          var items = (res&&res.items)||[];
          tbody.innerHTML = items.map(function(it){
            return '<tr>'+
              '<td>'+esc(it.data||'')+'</td>'+
              '<td>'+esc(it.fonte||'')+'</td>'+
              '<td>'+esc(it.evento||'')+'</td>'+
              '<td>'+esc(it.targa||'')+'</td>'+
              '<td class="text-end">'+esc(it.qta==null?'':it.qta)+'</td>'+
              '<td>'+esc(it.luogo||'')+'</td>'+
              '<td>'+esc(it.rif||'')+'</td>'+
              '<td>'+esc(it.note||'')+'</td>'+
            '</tr>';
          }).join('');
        })
        .withFailureHandler(function(){})
        .api_getDriverActivity(name, 300);
    };

    /* ---- KPI dashboard + timeline + anomalie ---- */
    function setRangeFromPreset(){
      var p=q("aut-period"),fr=q("aut-from"),to=q("aut-to");
      if(!p||!fr||!to) return;
      var v=p.value||"30d";
      if(v==="today"){fr.value=to.value=todayStr();}
      else if(v==="7d"){fr.value=daysAgoStr(7);to.value=todayStr();}
      else if(v==="30d"){fr.value=daysAgoStr(30);to.value=todayStr();}
      else{ if(!fr.value) fr.value=daysAgoStr(30); if(!to.value) to.value=todayStr(); }
    }

    function renderTimeline(rows){
      var tb = q("table-autista-timeline") ? q("table-autista-timeline").querySelector("tbody") : null;
      if(!tb) return;
      tb.innerHTML = (rows||[]).map(function(r){
        return "<tr><td>"+esc(r.data||"")+"</td><td>"+esc(r.fonte||"")+"</td><td>"+esc(r.evento||"")+"</td>"+
          "<td>"+esc(r.targa||"")+"</td><td class='text-end'>"+esc(r.qta==null?"":r.qta)+"</td>"+
          "<td>"+esc(r.luogo||"")+"</td><td>"+esc(r.note||"")+"</td></tr>";
      }).join("");
    }

    function renderAnomalies(rows){
      var tb = q("table-autista-anomalies") ? q("table-autista-anomalies").querySelector("tbody") : null;
      if(!tb) return;
      tb.innerHTML = (rows||[]).map(function(r){
        return "<tr><td>"+esc(r.tipo||"")+"</td><td>"+esc(r.targa||"")+"</td><td>"+esc(r.dettaglio||"")+"</td><td>"+esc(r.data||"")+"</td></tr>";
      }).join("");
    }

    app.autistiRefreshDashboard = function(){
      return new Promise(function(resolve,reject){
        var driver = q("sel-autista") ? q("sel-autista").value : "";
        if(!driver){ resolve(null); return; }
        var from = q("aut-from") ? q("aut-from").value : "";
        var to   = q("aut-to")   ? q("aut-to").value   : "";
        if(!from||!to){ setRangeFromPreset(); from=q("aut-from").value; to=q("aut-to").value; }
        google.script.run
          .withSuccessHandler(function(res){
            try{
              res=res||{};
              setText("aut-kpi-carichi", (res.kpi&&res.kpi.carichi)||0);
              setText("aut-kpi-scarichi",(res.kpi&&res.kpi.scarichi)||0);
              setText("aut-kpi-bancali", (res.kpi&&res.kpi.movBancali)||0);
              setText("aut-kpi-km",      (res.kpi&&(res.kpi.km==null?"—":res.kpi.km))||"—");
              renderTimeline(res.timeline||[]);
              renderAnomalies(res.anomalie||[]);
            }catch(e){}
            resolve(res);
          })
          .withFailureHandler(function(e){ reject(e); })
          .api_getDriverDashboard(driver, {from:from, to:to, limit:600});
      });
    };

    /* ---- Suggerisci autista ---- */
    app.autistiSuggest = function(){
      return new Promise(function(resolve,reject){
        var t = q("sug-targa") ? q("sug-targa").value.trim() : "";
        if(!t){ resolve(null); return; }
        google.script.run
          .withSuccessHandler(function(res){
            var msg = res&&res.suggested
              ? "Suggerito: "+res.suggested+(res.reason?" ("+res.reason+")":"")
              : "Nessun suggerimento affidabile.";
            if(res&&res.suggested&&q("sel-autista")) q("sel-autista").value=res.suggested;
            if(window.Swal) Swal.fire({icon:"info",title:"Suggerimento autista",html:msg});

          })
          .withFailureHandler(function(e){ reject(e); })
          .api_suggestDriverForTrailer(t);
      });

    /* ---- Registro Autisti (CRUD) ---- */
    function renderDriverRegistry(list){
      var table = q("table-driver-registry");
      if(!table) return;
      var tb = table.querySelector("tbody");
      if(!tb) return;
      tb.innerHTML = (list||[]).map(function(d){
        return "<tr>"+
          "<td>"+esc(d.cognome||"")+"</td>"+
          "<td>"+esc(d.targa||"")+"</td>"+
          "<td>"+esc(d.assicurazione||"")+"</td>"+
          "<td>"+esc(d.revisione||"")+"</td>"+
          "<td>"+esc(d.note||"")+"</td>"+
          "<td class='text-end'>"+
            "<button class='btn btn-outline-secondary btn-sm me-1' data-act='edit' data-id='"+esc(d.id||"")+"'><i class='fas fa-pen'></i></button>"+
            "<button class='btn btn-outline-danger btn-sm' data-act='del' data-id='"+esc(d.id||"")+"'><i class='fas fa-trash'></i></button>"+
          "</td></tr>";
      }).join("");
      if(!table.dataset.wired){
        table.dataset.wired="1";
        table.addEventListener("click",function(ev){
          var btn=ev.target.closest("button[data-act]");
          if(!btn) return;
          var id=btn.getAttribute("data-id");
          var act=btn.getAttribute("data-act");
          var reg=(app._driverRegistryCache&&app._driverRegistryCache.rows||[]).find(function(x){ return String(x.id)===String(id); });
          if(act==="edit") app.autistiOpenDriverModal(reg);
          if(act==="del")  app.autistiDeleteDriver(id);
        });

    app.autistiOpenDriverModal = function(driver){
      driver=driver||{};
      var isEdit=!!driver.id;
      var html =
        '<div class="swal2-form-grid">'+
          '<label>Cognome</label><input id="drv-cognome" class="swal2-input" value="'+esc(driver.cognome||"")+'" placeholder="Es. Rossi">'+
          '<label>Targa</label><input id="drv-targa" class="swal2-input" value="'+esc(driver.targa||"")+'" placeholder="Es. AB123CD">'+
          '<label>Assicurazione</label><input id="drv-ass" type="date" class="swal2-input" value="'+esc(String(driver.assicurazione||"").slice(0,10))+'">'+
          '<label>Revisione</label><input id="drv-rev" type="date" class="swal2-input" value="'+esc(String(driver.revisione||"").slice(0,10))+'">'+
          '<label>Note</label><textarea id="drv-note" class="swal2-textarea" placeholder="Note...">'+esc(driver.note||"")+'</textarea>'+
        '</div>';
      function buildPayload(){
        return {
          id:           driver.id||"",
          cognome:      (document.getElementById("drv-cognome").value||"").trim(),
          targa:        (document.getElementById("drv-targa").value||"").trim(),
          assicurazione:(document.getElementById("drv-ass").value||"").trim(),
          revisione:    (document.getElementById("drv-rev").value||"").trim(),
          note:         (document.getElementById("drv-note").value||"").trim()
        };
      }
      if(window.Swal){
        Swal.fire({
          title:isEdit?"Modifica autista":"Nuovo autista",
          html:html, focusConfirm:false,
          showCancelButton:true,confirmButtonText:"Salva",cancelButtonText:"Annulla",
          preConfirm:function(){
            var p=buildPayload();
            return new Promise(function(resolve,reject){
              google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(function(e){ Swal.showValidationMessage(String(e&&e.message||e)); reject(e); })
                .api_upsertDriver(p);
            });
          }
        }).then(function(r){
          if(!r.isConfirmed) return;
          // forza ricarica fresca
          if(app._driverRegistryCache) app._driverRegistryCache.ts=0;
          app.autistiLoadDrivers(true).then(function(labels){
            var savedKey = driverLabel(buildPayload&&{Cognome:(r.value&&r.value.cognome)||"",Targa:(r.value&&r.value.targa)||""});
            fillAllDriverSelects(labels, savedKey||"");
          });
        });
      }else{
        if(confirm("Salvare questo autista?")){
          google.script.run
            .withSuccessHandler(function(){ if(app._driverRegistryCache) app._driverRegistryCache.ts=0; app.autistiLoadDrivers(true); })
            .api_upsertDriver(buildPayload());
        }
      }
    };

    app.autistiDeleteDriver = function(id){
      id=String(id||"").trim();
      if(!id) return;
      function go(){
        google.script.run
          .withSuccessHandler(function(){ if(app._driverRegistryCache) app._driverRegistryCache.ts=0; app.autistiLoadDrivers(true); })
          .withFailureHandler(function(e){ if(window.Swal) Swal.fire("Errore",String(e),"error"); })
          .api_deleteDriver(id);
      }
      if(window.Swal){
        Swal.fire({icon:"warning",title:"Eliminare autista?",text:"Operazione irreversibile.",
          showCancelButton:true,confirmButtonText:"Elimina",cancelButtonText:"Annulla"
        }).then(function(r){ if(r.isConfirmed) go(); });
      }else{ if(confirm("Eliminare autista?")) go(); }
    };

    /* ---- Wiring bottoni tab Autisti ---- */
    function wireAutistiUI(){
      function w(id, ev, fn){
        var el=q(id);
        if(el&&!el.dataset["w_"+ev]){ el.dataset["w_"+ev]="1"; el.addEventListener(ev,fn); }
      }
      w("btn-autista-refresh",  "click", function(){ app.autistiLoadDrivers(true).then(function(){ app.autistiRefresh(); }); });
      w("btn-assegna-autista",  "click", function(){ app.autistiAssign(); });
      w("btn-unassign-autista", "click", function(){ app.autistiUnassign(); });  // <<< FIX: era scollegato
      w("btn-autista-dashboard","click", function(){ app.autistiRefreshDashboard(); });
      w("btn-suggerisci-autista","click",function(){ app.autistiSuggest(); });
      w("btn-driver-new",       "click", function(){ app.autistiOpenDriverModal(null); });
      w("sel-autista","change", function(){ app.autistiRefresh(); app.autistiRefreshDashboard(); });
      w("aut-period","change",  function(){ setRangeFromPreset(); });
    }

    /* ---- Hook su showTab (unico, non-distruttivo) ---- */
    if(typeof app.showTab==="function" && !app._autistiShowTabHooked_v26){
      app._autistiShowTabHooked_v26=true;
      var _origShowTab = app.showTab;
      app.showTab = function(tab){
        var r = _origShowTab.apply(app, arguments);
        try{
          if(String(tab)==="autisti"){
            wireAutistiUI();
            setRangeFromPreset();
            // Primo accesso: carica tutto. Accessi successivi: aggiorna solo assegnazioni
            if(!app._autistiInitDone){
              app._autistiInitDone=true;
              app.autistiLoadDrivers(true).then(function(){ app.autistiRefresh(); });
            }else{
              app.autistiRefresh();
            }
          }
          if(String(tab)==="rubrica"){
            try{ loadRubrica_(function(){ app.renderRubrica && app.renderRubrica(); }); }catch(e){}
          }
        }catch(e){}
        return r;
      };
    }

    // Wire immediato (se la view è già visibile al caricamento)
    try{ wireAutistiUI(); }catch(e){}

  }catch(e){ console.error("[AUTISTI_UNIFIED_V26]",e); }
})();



// ══════════════════════════════════════════════════════════════
//  RUBRICA INDIRIZZI — CRUD + AUTOCOMPLETE
// ══════════════════════════════════════════════════════════════
(function(){
  const app = window.app;
  if (!app) return;

  // Cache locale rubrica
  let _rubrica = [];
  let _rubricaLoaded = false;

  // Normalizza un record dalla rubrica (vecchio o nuovo formato)
  function normalizeRubricaRow_(r) {
    if (!r) return null;
    // Se ha già il formato nuovo (campo "nome" minuscolo) → ok
    if (r.nome !== undefined) return r;
    // Vecchio formato da getSheetData_ (chiavi = nomi colonne foglio)
    var nome = String(r['Nome']||r['nome']||'').trim();
    if (!nome) return null;
    return {
      id:        String(r['ID']||r['id']||'').trim() || ('R-'+Math.random().toString(36).slice(2,7)),
      nome,
      indirizzo: String(r['Indirizzo']||r['indirizzo']||'').trim(),
      citta:     String(r['Città']||r['Citta']||r['citta']||'').trim(),
      provincia: String(r['Provincia']||r['provincia']||'').trim(),
      telefono:  String(r['Telefono']||r['telefono']||'').trim(),
      tipo:      String(r['Tipo']||r['tipo']||'Entrambi').trim(),
      note:      String(r['Note']||r['note']||'').trim()
    };
  }

  // ── Carica rubrica dal server ──────────────────────────────
  function loadRubrica_(cb) {
    // Usa dati già in app.data (caricati all'avvio) se disponibili
    if (!_rubricaLoaded && app.data && app.data.rubrica && app.data.rubrica.length) {
      _rubrica = app.data.rubrica.map(normalizeRubricaRow_).filter(Boolean);
      _rubricaLoaded = true;
      if (cb) cb();
      return;
    }
    if (_rubricaLoaded) { if (cb) cb(); return; }
    google.script.run
      .withSuccessHandler(function(rows) {
        _rubrica = (rows || []).map(normalizeRubricaRow_).filter(Boolean);
        _rubricaLoaded = true;
        if (app.data) app.data.rubrica = _rubrica;
        if (cb) cb();
      })
      .withFailureHandler(function(e) { console.error('loadRubrica_', e); if (cb) cb(); })
      .api_getRubricaIndirizzi();
  }

  // ── Render tabella ─────────────────────────────────────────
  app.renderRubrica = function() {
    const q    = (document.getElementById('rubrica-search') || {}).value || '';
    const tipo = (document.getElementById('rubrica-filter-tipo') || {}).value || '';
    const qLC  = q.toLowerCase();

    const rows = _rubrica.filter(r => {
      if (tipo && r.tipo && r.tipo !== tipo && r.tipo !== 'Entrambi') return false;
      if (!qLC) return true;
      return (r.nome+r.indirizzo+r.citta+r.provincia+r.telefono+r.note).toLowerCase().includes(qLC);
    });

    const cnt = document.getElementById('rubrica-count');
    if (cnt) cnt.textContent = rows.length + ' contatt' + (rows.length===1?'o':'i');

    const tbody = document.getElementById('rubrica-tbody');
    if (!tbody) return;
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Nessun contatto trovato</td></tr>';
      return;
    }

    const tipoBadge = { Mittente:'bg-primary', Destinatario:'bg-success', Entrambi:'bg-info text-dark' };
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="fw-semibold">${esc(r.nome)}</td>
        <td>${esc(r.indirizzo)}</td>
        <td>${esc(r.citta)}</td>
        <td>${esc(r.provincia)}</td>
        <td>${esc(r.telefono)}</td>
        <td>${r.tipo ? '<span class="badge '+( tipoBadge[r.tipo]||'bg-secondary')+'">'+esc(r.tipo)+'</span>' : ''}</td>
        <td class="small text-muted">${esc(r.note)}</td>
        <td>
          <button class="btn btn-outline-secondary btn-sm py-0 px-1 me-1" title="Modifica" onclick="app.openRubricaModal(${JSON.stringify(r)})"><i class="fas fa-pencil"></i></button>
          <button class="btn btn-outline-danger btn-sm py-0 px-1" title="Elimina" onclick="app.deleteRubricaContatto('${esc(r.id)}','${esc(r.nome)}')"><i class="fas fa-trash"></i></button>
        </td>
      </tr>`).join('');
  };

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  app.filterRubrica = function() { app.renderRubrica(); };

  // ── Apri modal (nuovo o modifica) ─────────────────────────
  app.openRubricaModal = function(r) {
    r = r || {};
    document.getElementById('rubrica-modal-title').textContent = r.id ? 'Modifica contatto' : 'Nuovo contatto';
    document.getElementById('rubrica-edit-id').value  = r.id || '';
    document.getElementById('rubrica-nome').value      = r.nome || '';
    document.getElementById('rubrica-indirizzo').value = r.indirizzo || '';
    document.getElementById('rubrica-citta').value     = r.citta || '';
    document.getElementById('rubrica-provincia').value = r.provincia || '';
    document.getElementById('rubrica-telefono').value  = r.telefono || '';
    document.getElementById('rubrica-tipo').value      = r.tipo || 'Entrambi';
    document.getElementById('rubrica-note').value      = r.note || '';
    var m = new bootstrap.Modal(document.getElementById('modalRubrica'));
    m.show();
  };

  // ── Salva contatto ─────────────────────────────────────────
  app.saveRubricaContatto = function() {
    var nome = document.getElementById('rubrica-nome').value.trim();
    if (!nome) { alert('Il nome è obbligatorio'); return; }

    var entry = {
      id:         document.getElementById('rubrica-edit-id').value.trim(),
      nome:       nome,
      indirizzo:  document.getElementById('rubrica-indirizzo').value.trim(),
      citta:      document.getElementById('rubrica-citta').value.trim(),
      provincia:  document.getElementById('rubrica-provincia').value.trim().toUpperCase().slice(0,2),
      telefono:   document.getElementById('rubrica-telefono').value.trim(),
      tipo:       document.getElementById('rubrica-tipo').value,
      note:       document.getElementById('rubrica-note').value.trim()
    };

    bootstrap.Modal.getInstance(document.getElementById('modalRubrica')).hide();
    app.showLoading && app.showLoading(true);

    google.script.run
      .withSuccessHandler(function(res) {
        app.showLoading && app.showLoading(false);
        if (res && res.ok) {
          // aggiorna cache locale
          var idx = _rubrica.findIndex(x => x.id === entry.id);
          if (idx >= 0) _rubrica[idx] = Object.assign(_rubrica[idx], entry, {id: res.id});
          else _rubrica.push(Object.assign(entry, {id: res.id}));
          _rubrica.sort((a,b) => a.nome.localeCompare(b.nome,'it'));
          if (app.data) app.data.rubrica = _rubrica;
          app.renderRubrica();
        } else {
          Swal.fire('Errore', (res&&res.error)||'Errore salvataggio', 'error');
        }
      })
      .withFailureHandler(function(e) {
        app.showLoading && app.showLoading(false);
        Swal.fire('Errore', String(e.message||e), 'error');
      })
      .api_upsertRubricaIndirizzo(entry);
  };

  // ── Elimina contatto ───────────────────────────────────────
  app.deleteRubricaContatto = function(id, nome) {
    Swal.fire({
      title: 'Elimina contatto?',
      html: '<b>' + esc(nome) + '</b> verrà rimossa dalla rubrica.',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Elimina',
      cancelButtonText: 'Annulla',
      confirmButtonColor: '#dc3545'
    }).then(function(r) {
      if (!r.isConfirmed) return;
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.ok) {
            _rubrica = _rubrica.filter(x => x.id !== id);
            if (app.data) app.data.rubrica = _rubrica;
            app.renderRubrica();
          }
        })
        .withFailureHandler(function(e) { Swal.fire('Errore', String(e.message||e), 'error'); })
        .api_deleteRubricaIndirizzo(id);
    });
  };

  // ── AUTOCOMPLETAMENTO mittente / destinatario ──────────────
  var _acTimer = null;

  app.rubricaAutocomplete = function(input, campo) {
    clearTimeout(_acTimer);
    var q = input.value.trim().toLowerCase();
    var dropId = 'rubrica-drop-' + campo;
    var drop = document.getElementById(dropId);
    if (!drop) return;

    if (q.length < 1) { drop.style.display = 'none'; return; }

    _acTimer = setTimeout(function() {
      // Filtra rubrica: per campo mittente mostra Mittente+Entrambi, dest → Destinatario+Entrambi
      var tipoFiltro = campo === 'mittente' ? ['Mittente','Entrambi',''] : ['Destinatario','Entrambi',''];
      var matches = _rubrica.filter(function(r) {
        if (!tipoFiltro.includes(r.tipo||'')) return false;
        return (r.nome||'').toLowerCase().includes(q) ||
               (r.citta||'').toLowerCase().includes(q);
      }).slice(0, 8);

      if (!matches.length) { drop.style.display = 'none'; return; }

      drop.innerHTML = matches.map(function(r) {
        var sub = [r.indirizzo, r.citta, r.provincia].filter(Boolean).join(', ');
        var dataAttr = "data-campo='" + campo + "' data-idx='" + _rubrica.indexOf(r) + "'";
        return '<div class="rubrica-dropdown-item" ' + dataAttr + ' onmousedown="app._rubricaPickIdx_(event)">' +
               '<div class="rdi-nome">' + esc(r.nome) + '</div>' +
               (sub ? '<div class="rdi-sub">' + esc(sub) + '</div>' : '') +
               '</div>';
      }).join('');
      drop.style.display = 'block';

      // Carica rubrica dal server se ancora vuota
      if (!_rubrica.length) {
        loadRubrica_(function() { app.rubricaAutocomplete(input, campo); });
      }
    }, 120);
  };

  // Wrapper chiamato da onclick nel dropdown (evita escape di JSON in HTML)
  app._rubricaPickIdx_ = function(e) {
    e.preventDefault();
    var el = e.currentTarget || e.target;
    var campo = el.getAttribute('data-campo');
    var idx   = parseInt(el.getAttribute('data-idx'), 10);
    var r = _rubrica[idx];
    if (!r || !campo) return;
    app.rubricaSelectItem(e, campo, r);
  };

  app.rubricaSelectItem = function(e, campo, r) {
    e.preventDefault();
    var inputId = campo === 'mittente' ? 'vm-mittente' : 'vm-destinatario';
    var el = document.getElementById(inputId);
    if (el) el.value = r.nome;

    // Per il DESTINATARIO riempi indirizzo/città/prov/tel nel form scarico
    if (campo === 'destinatario') {
      var addr  = document.getElementById('vm-indirizzo');
      var citta = document.getElementById('vm-citta');
      var prov  = document.getElementById('vm-provincia');
      var tel   = document.getElementById('vm-telefono');
      if (addr  && r.indirizzo) addr.value  = r.indirizzo;
      if (citta && r.citta)     citta.value = r.citta;
      if (prov  && r.provincia) prov.value  = r.provincia;
      if (tel   && r.telefono)  tel.value   = r.telefono;
    }

    // Per il MITTENTE riempi i campi mittente separati
    if (campo === 'mittente') {
      var mAddr  = document.getElementById('vm-mitt-indirizzo');
      var mCitta = document.getElementById('vm-mitt-citta');
      var mProv  = document.getElementById('vm-mitt-provincia');
      var mTel   = document.getElementById('vm-mitt-telefono');
      if (mAddr  && r.indirizzo) mAddr.value  = r.indirizzo;
      if (mCitta && r.citta)     mCitta.value = r.citta;
      if (mProv  && r.provincia) mProv.value  = r.provincia;
      if (mTel   && r.telefono)  mTel.value   = r.telefono;
    }

    // Aggiorna anche lo stato interno della stop corrente
    try {
      if (window.app && app.state && app.state.vm) {
        var s = app.getCurrentStop_ ? app.getCurrentStop_() : null;
        if (s) {
          if (campo === 'mittente') {
            s.Mittente = r.nome;
            s.mittIndirizzoConsegna = r.indirizzo || s.mittIndirizzoConsegna || '';
            s.mittCittaConsegna     = r.citta     || s.mittCittaConsegna || '';
            s.mittProvinciaConsegna = r.provincia || s.mittProvinciaConsegna || '';
            s.mittTelefono          = r.telefono  || s.mittTelefono || '';
          } else {
            s.Destinatario         = r.nome;
            s.indirizzoConsegna    = r.indirizzo || s.indirizzoConsegna || '';
            s.cittaConsegna        = r.citta     || s.cittaConsegna || '';
            s.provinciaConsegna    = r.provincia || s.provinciaConsegna || '';
            s.telefono             = r.telefono  || s.telefono || '';
          }
        }
      }
    } catch(_) {}

    var drop = document.getElementById('rubrica-drop-' + campo);
    if (drop) drop.style.display = 'none';
  };

  app.rubricaHideDropdown = function(delay) {
    setTimeout(function() {
      document.querySelectorAll('.rubrica-dropdown').forEach(function(d) {
        d.style.display = 'none';
      });
    }, delay || 200);
  };

  // ── Autocomplete rubrica per form MAGAZZINO ──────────────────
  app.mzRubricaAC = function(input, dropSuffix) {
    clearTimeout(_acTimer);
    var q = input.value.trim().toLowerCase();
    var dropId = 'rubrica-drop-' + dropSuffix;
    var drop = document.getElementById(dropId);
    if (!drop) return;
    if (q.length < 1) { drop.style.display = 'none'; return; }

    _acTimer = setTimeout(function() {
      var isMitt = dropSuffix === 'mz-mitt';
      var tipoFiltro = isMitt ? ['Mittente','Entrambi',''] : ['Destinatario','Entrambi',''];
      var matches = _rubrica.filter(function(r) {
        if (!tipoFiltro.includes(r.tipo||'')) return false;
        return (r.nome||'').toLowerCase().includes(q) || (r.citta||'').toLowerCase().includes(q);
      }).slice(0, 8);

      if (!matches.length) { drop.style.display = 'none'; return; }

      drop.innerHTML = matches.map(function(r) {
        var sub = [r.indirizzo, r.citta, r.provincia].filter(Boolean).join(', ');
        var dataAttr = "data-mzdrop='" + dropSuffix + "' data-idx='" + _rubrica.indexOf(r) + "'";
        return '<div class="rubrica-dropdown-item" ' + dataAttr + ' onmousedown="app._mzPickIdx_(event)">' +
               '<div class="rdi-nome">' + esc(r.nome) + '</div>' +
               (sub ? '<div class="rdi-sub">' + esc(sub) + '</div>' : '') +
               '</div>';
      }).join('');
      drop.style.display = 'block';

      if (!_rubrica.length) loadRubrica_(function() { app.mzRubricaAC(input, dropSuffix); });
    }, 120);
  };

  app._mzPickIdx_ = function(e) {
    e.preventDefault();
    var el = e.currentTarget || e.target;
    var dropSuffix = el.getAttribute('data-mzdrop');
    var idx = parseInt(el.getAttribute('data-idx'), 10);
    var r = _rubrica[idx];
    if (!r || !dropSuffix) return;
    var isMitt = dropSuffix === 'mz-mitt';

    // Riempi i campi del blocco corretto
    var prefix = isMitt ? 'mz-mitt' : 'mz-dest';
    var nameEl = document.getElementById(isMitt ? 'mz-cliente' : 'mz-destinazione');
    if (nameEl) nameEl.value = r.nome;

    var fill = function(id, val) { var el = document.getElementById(id); if (el && val) el.value = val; };
    fill(prefix + '-indirizzo', r.indirizzo);
    fill(prefix + '-citta',     r.citta);
    fill(prefix + '-provincia', r.provincia);
    fill(prefix + '-telefono',  r.telefono);

    var drop = document.getElementById('rubrica-drop-' + dropSuffix);
    if (drop) drop.style.display = 'none';
  };

  // ── Precarica rubrica all'avvio: immediata dopo i dati ────
  // (loadRubrica_ viene anche chiamata da onDataLoaded via app.data.rubrica)
  setTimeout(function() { loadRubrica_(null); }, 100);

})();

/* ======================= IMPORTAZIONE MASSIVA ======================= */

var _importMassivoLastParsed_ = null;

function importMassivoReset() {
  document.getElementById('imp-step1').classList.remove('d-none');
  document.getElementById('imp-loading').classList.add('d-none');
  document.getElementById('imp-preview').classList.add('d-none');
  document.getElementById('imp-result').classList.add('d-none');
}
window.importMassivoReset = importMassivoReset;

function _importMassivoShowLoading_() {
  document.getElementById('imp-step1').classList.add('d-none');
  document.getElementById('imp-loading').classList.remove('d-none');
  document.getElementById('imp-preview').classList.add('d-none');
  document.getElementById('imp-result').classList.add('d-none');
}

function _importMassivoOptions_() {
  return {
    importaRimorchi: document.getElementById('imp-chk-rimorchi').checked,
    importaEpal: document.getElementById('imp-chk-epal').checked,
    importaAutisti: document.getElementById('imp-chk-rimorchi').checked
  };
}

function importMassivoPreview() {
  const txt = (document.getElementById('imp-textarea').value || '').trim();
  if (!txt) { Swal.fire('Attenzione', 'Incolla prima il testo da importare.', 'warning'); return; }
  _importMassivoShowLoading_();
  const opts = Object.assign({}, _importMassivoOptions_(), { dryRun: true });
  google.script.run
    .withSuccessHandler((res) => {
      document.getElementById('imp-loading').classList.add('d-none');
      if (!res || !res.ok) {
        importMassivoReset();
        Swal.fire('Errore AI', res && res.error ? res.error : 'Errore sconosciuto', 'error');
        return;
      }
      _importMassivoLastParsed_ = res.preview;
      _renderImportPreview_(res.preview);
      document.getElementById('imp-preview').classList.remove('d-none');
    })
    .withFailureHandler((e) => { importMassivoReset(); app.onError(e); })
    .api_importMassivo(txt, opts);
}
window.importMassivoPreview = importMassivoPreview;

function importMassivoExecute() {
  const txt = (document.getElementById('imp-textarea').value || '').trim();
  if (!txt) { Swal.fire('Attenzione', 'Incolla prima il testo da importare.', 'warning'); return; }
  Swal.fire({
    title: 'Importa e salva?',
    html: "I dati estratti dall\'AI verranno scritti direttamente nel gestionale.<br><small class='text-muted'>Usa prima 'Anteprima' per verificare cosa verra importato.</small>",
    icon: 'question', showCancelButton: true, confirmButtonText: 'Importa', cancelButtonText: 'Annulla'
  }).then((r) => {
    if (!r.isConfirmed) return;
    _importMassivoShowLoading_();
    const opts = Object.assign({}, _importMassivoOptions_(), { dryRun: false });
    google.script.run
      .withSuccessHandler((res) => { _handleImportResult_(res); })
      .withFailureHandler((e) => { importMassivoReset(); app.onError(e); })
      .api_importMassivo(txt, opts);
  });
}
window.importMassivoExecute = importMassivoExecute;

function importMassivoSave() {
  const txt = (document.getElementById('imp-textarea').value || '').trim();
  if (!txt) return;
  _importMassivoShowLoading_();
  const opts = Object.assign({}, _importMassivoOptions_(), { dryRun: false });
  google.script.run
    .withSuccessHandler((res) => { _handleImportResult_(res); })
    .withFailureHandler((e) => { importMassivoReset(); app.onError(e); })
    .api_importMassivo(txt, opts);
}
window.importMassivoSave = importMassivoSave;

function _handleImportResult_(res) {
  document.getElementById('imp-loading').classList.add('d-none');
  if (!res || !res.ok) {
    importMassivoReset();
    Swal.fire('Errore', res && res.error ? res.error : 'Errore importazione', 'error');
    return;
  }
  const r = res.risultati || {};
  const e = res.errori || [];
  let html = '<div class="alert alert-success"><i class="fas fa-check-circle me-2"></i><strong>Importazione completata!</strong></div>';
  html += '<ul class="list-group mb-3">';
  if ((r.rimorchi||[]).length) html += `<li class="list-group-item d-flex justify-content-between"><span>Rimorchi aggiornati</span><span class="badge bg-primary">${r.rimorchi.length}</span></li>`;
  if ((r.autisti||[]).length)  html += `<li class="list-group-item d-flex justify-content-between"><span>Autisti abbinati</span><span class="badge bg-secondary">${r.autisti.length}</span></li>`;
  if ((r.epal||[]).length)     html += `<li class="list-group-item d-flex justify-content-between"><span>Movimenti EPAL registrati</span><span class="badge bg-warning text-dark">${r.epal.length}</span></li>`;
  html += '</ul>';
  if (e.length) {
    html += `<div class="alert alert-warning"><strong>${e.length} errori:</strong><ul class="mb-0 mt-1">`;
    e.forEach(err => { html += `<li class="small">${app.escapeHtml(err.tipo)} ${app.escapeHtml(err.targa||err.luogo||'')}: ${app.escapeHtml(err.errore)}</li>`; });
    html += '</ul></div>';
  }
  document.getElementById('imp-result-content').innerHTML = html;
  document.getElementById('imp-preview').classList.add('d-none');
  document.getElementById('imp-result').classList.remove('d-none');
  try { if (typeof app.loadAllData === 'function') app.loadAllData(); } catch(ex) {}
}

function _renderImportPreview_(parsed) {
  const eh = (s) => app.escapeHtml(s);
  let html = '';
  const rim  = parsed.rimorchi || [];
  const epal = parsed.epal || [];
  const aut  = parsed.autisti_agganciati || [];

  if (rim.length) {
    html += `<h6 class="fw-bold mt-2"><i class="fas fa-truck-moving me-1 text-primary"></i>Rimorchi (${rim.length})</h6>`;
    html += '<div class="table-responsive"><table class="table table-sm table-bordered small">';
    html += '<thead class="table-light"><tr><th>Targa</th><th>Stato</th><th>Posizione</th><th>Scarichi</th><th>Autista</th><th>Note</th></tr></thead><tbody>';
    rim.forEach(r => {
      const sc = (r.scarichi||[]).map(s =>
        eh(s.destinatario||'') + (s.materiale ? ' &ndash; '+eh(s.materiale) : '') +
        (s.dataTassativa ? ` <span class="badge bg-danger">TAX ${eh(s.dataTassativa)}</span>` : '')
      ).join('<br>');
      html += `<tr><td><strong>${eh(r.targa||'')}</strong></td><td>${eh(r.stato||'')}</td><td>${eh(r.posizione||'')}</td><td>${sc||'&mdash;'}</td><td>${eh(r.autista||'&mdash;')}</td><td>${eh(r.note||'&mdash;')}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  if (aut.length) {
    html += `<h6 class="fw-bold mt-3"><i class="fas fa-user-tie me-1 text-secondary"></i>Autisti agganciati (${aut.length})</h6>`;
    html += '<div class="table-responsive"><table class="table table-sm table-bordered small">';
    html += '<thead class="table-light"><tr><th>Autista</th><th>Targa</th><th>Note</th></tr></thead><tbody>';
    aut.forEach(a => { html += `<tr><td>${eh(a.autista||'')}</td><td>${eh(a.targa||'')}</td><td>${eh(a.note||'&mdash;')}</td></tr>`; });
    html += '</tbody></table></div>';
  }

  if (epal.length) {
    html += `<h6 class="fw-bold mt-3"><i class="fas fa-pallet me-1 text-warning"></i>Movimenti EPAL (${epal.length})</h6>`;
    html += '<div class="table-responsive"><table class="table table-sm table-bordered small">';
    html += '<thead class="table-light"><tr><th>Qt.</th><th>Tipo</th><th>Luogo</th><th>Autista/Targa</th><th>Data</th><th>Note</th></tr></thead><tbody>';
    epal.forEach(e => {
      const badge = e.tipoMovimento === 'RITIRO' ? 'bg-danger' : 'bg-success';
      html += `<tr><td><strong>${eh(String(e.quantita||''))}</strong></td><td><span class="badge ${badge}">${eh(e.tipoMovimento||'DEPOSITO')}</span></td><td>${eh(e.luogo||'')}</td><td>${eh(e.autistaTarga||'&mdash;')}</td><td>${eh(e.data||'&mdash;')}</td><td class="text-truncate" style="max-width:180px" title="${eh(e.note||'')}">${eh(e.note||'&mdash;')}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  if (!rim.length && !epal.length && !aut.length) {
    html = '<div class="alert alert-warning">L\'AI non ha estratto dati strutturati dal testo. Verifica il formato.</div>';
  }
  document.getElementById('imp-preview-content').innerHTML = html;
}


 * - **grassetto**, *corsivo*, `codice`
 * - link in stile [testo](url) e URL "nudi" (es. link Google Maps) -> cliccabili
 * - elenchi puntati/numerati e intestazioni (#, ##, ...)
 * Il testo viene prima escapato (anti-XSS), poi formattato in HTML.
 */
function renderCometAiMarkdown_(text) {
  if (!text) return '';

  // 1) Escape HTML di base
  var escaped = String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 2) Codice inline `...`
  escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 3) Link markdown [testo](url) e URL "nudi" (es. link Google Maps/Drive)
  escaped = escaped.replace(
    /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)|(https?:\/\/[^\s<]+)/g,
    function(match, linkText, linkUrl, bareUrl) {
      if (linkUrl) {
        return '<a href="' + linkUrl + '" target="_blank" rel="noopener">' + linkText + '</a>';
      }
      var clean = bareUrl.replace(/[.,;:!?)]+$/, '');
      var trail = bareUrl.slice(clean.length);
      return '<a href="' + clean + '" target="_blank" rel="noopener">' + clean + '</a>' + trail;
    }
  );

  // 4) Grassetto e corsivo
  escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  escaped = escaped.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

  // 5) Righe -> intestazioni / elenchi / paragrafi
  var lines = escaped.split(/\r?\n/);
  var html = '';
  var inUl = false, inOl = false;

  lines.forEach(function(line) {
    var trimmed = line.trim();
    var ulMatch = trimmed.match(/^[-*]\s+(.*)$/);;
    var olMatch = trimmed.match(/^\d+[.)]\s+(.*)$/);
    var headingMatch = trimmed.match(/^#{1,4}\s+(.*)$/);

    if (ulMatch) {
      if (inOl) { html += '</ol>'; inOl = false; }
      if (!inUl) { html += '<ul class="ps-3">'; inUl = true; }
      html += '<li>' + ulMatch[1] + '</li>';
      return;
    }
    if (olMatch) {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (!inOl) { html += '<ol class="ps-3">'; inOl = true; }
      html += '<li>' + olMatch[1] + '</li>';
      return;
    }

    if (inUl) { html += '</ul>'; inUl = false; }
    if (inOl) { html += '</ol>'; inOl = false; }

    if (headingMatch) {
      html += '<div class="fw-bold mt-2 mb-1">' + headingMatch[1] + '</div>';
    } else if (trimmed === '') {
      html += '<div class="mb-2"></div>';
    } else {
      html += line + '<br>';
    }
  });

  if (inUl) html += '</ul>';
  if (inOl) html += '</ol>';

  return html;
}

function submitOmnibarQuery() {
  var inputEl = document.getElementById('comet-omnibar-input');
  var panelEl = document.getElementById('comet-copilot-panel');
  var loaderEl = document.getElementById('comet-copilot-loader');
  var resultEl = document.getElementById('comet-copilot-result');
  var badgeEl = document.getElementById('comet-copilot-badge');
  
  var query = inputEl.value.trim();
  if (!query) return;

  // Mostra pannello e loader di caricamento
  panelEl.classList.remove('d-none');
  loaderEl.classList.remove('d-none');
  resultEl.innerHTML = '';
  badgeEl.innerHTML = '';

  // Chiamata asincrona alle Google Apps Script API del backend
  google.script.run
    .withSuccessHandler(function(res) {
      loaderEl.classList.add('d-none');
      
      if (res && res.ok) {
        resultEl.innerHTML = renderCometAiMarkdown_(res.text);
        
        // Assegnazione del badge operativo basato sull'azione dell'Agente AI
        if (res.action === "WRITE") {
          badgeEl.innerHTML = '<span class="badge bg-success"><i class="fa-solid fa-floppy-disk"></i> Modifica Applicata via ' + res.toolUsed + '</span>';
          
          // REATTIVITA' UI LOGISTICA: Ricarica i moduli locali del frontend se aperti
          // Controlla se esistono e invoca le tue funzioni globali di refresh dati
          if (typeof app !== 'undefined' && typeof app.loadAllData === 'function') {
             // Se hai una funzione di reload globale o parziale per aggiornare le datatable
             app.loadAllData(); 
          } else if (window.app && typeof window.app.refreshCurrentTab === 'function') {
             window.app.refreshCurrentTab();
          }
        } else if (res.action === "READ") {
          badgeEl.innerHTML = '<span class="badge bg-info text-dark"><i class="fa-solid fa-magnifying-glass"></i> Dati Consultati via ' + res.toolUsed + '</span>';
        } else {
          badgeEl.innerHTML = '<span class="badge bg-secondary"><i class="fa-solid fa-message"></i> Assistenza Conversazionale</span>';
        }
      } else {
        resultEl.innerHTML = '<div class="text-danger"><i class="fa-solid fa-triangle-exclamation"></i> Errore: ' + (res.error || 'Impossibile elaborare il comando.') + '</div>';
      }
    })
    .withFailureHandler(function(err) {
      loaderEl.classList.add('d-none');
      resultEl.innerHTML = '<div class="text-danger"><i class="fa-solid fa-circle-xmark"></i> Eccezione di rete: ' + err + '</div>';
    })
    .api_askGemini(query);
}
window.submitOmnibarQuery = submitOmnibarQuery;
