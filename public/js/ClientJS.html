<script>


/* === PATCH: compatibilità forceHideLoadingOverlay (evita ReferenceError) === */
window.forceHideLoadingOverlay = window.forceHideLoadingOverlay || function(){
  try{
    var el = document.getElementById('loading-overlay');
    if(!el) return;
    el.classList.remove('is-active');
    el.style.display = 'none';
    el.style.pointerEvents = 'none';
  }catch(e){ console.error(e); }
};
/* === /PATCH === */
window.closeAnyOpenBootstrapModal = window.closeAnyOpenBootstrapModal || function(){
  try{
    var open = document.querySelectorAll('.modal.show');
    open.forEach(function(m){
      var inst = (window.bootstrap && window.bootstrap.Modal) ? window.bootstrap.Modal.getInstance(m) : null;
      if(inst){ inst.hide(); }
      else { m.classList.remove('show'); m.style.display='none'; document.body.classList.remove('modal-open'); }
    });
    var backs = document.querySelectorAll('.modal-backdrop');
    backs.forEach(function(b){ b.remove(); });
  }catch(e){ console.error(e); }
};

(function(){
  var app = window.app || { _q: [] };
  window.app = app;

  // Navigazione tab (Dashboard/Flotta/Magazzino/Planning/EPAL/Config ecc.)
  // Convenzione: ogni sezione ha id="view-<nomeTab>"
  app.showTab = function(name) {
    try {
      const tab = String(name || "").trim() || "dashboard";
      const views = Array.from(document.querySelectorAll('[id^="view-"]'));
      views.forEach(el => {
        const isTarget = el.id === ("view-" + tab);
        el.classList.toggle("d-none", !isTarget);
        if (isTarget) el.removeAttribute("aria-hidden");
        else el.setAttribute("aria-hidden", "true");
      });

      // Evidenzia voce menu se esiste (qualsiasi elemento con onclick che chiama showTab)
      const buttons = Array.from(document.querySelectorAll('[onclick*="showTab"]'));
      buttons.forEach(b => {
        const oc = String(b.getAttribute("onclick") || "");
        const mt = oc.match(/showTab\(\s*['"]([^'"]+)['"]\s*\)/);
        const match = mt ? mt[1] : "";
        b.classList.toggle("active", match === tab);
      });

      // Aggiorna hash per ripristino view
      if (location && typeof location.hash === "string") {
        location.hash = tab;
      }
    } catch (e) {
      console.error("showTab error:", e);
    }
  };


  function replayQueue(){
    try{
      var q = app._q || [];
      app._q = [];
      q.forEach(function(it){
        if(!it || !it.length) return;
        var fn = it[0];
        var arg = it[1];
        if(typeof app[fn] === 'function') app[fn](arg);
      });
    }catch(e){ console.error(e); }
  }

app = window.app = {
  data: {},
  state: {
    selectedTrailers: new Set(),
    map: null,
    calendar: null,
    charts: {},
    currentTrailer: null
  },

  init: function() {
    this.showLoading(true);

    // Caricamento parallelo: ping + dati operativi + navi contemporaneamente
    let _pingOk = false, _dataRes = null, _naviRes = null;
    let _pingErr = null, _dataErr = null;
    let _resolved = 0;

    const tryFinish_ = () => {
      _resolved++;
      if (_resolved < 2) return;
      if (_pingErr) {
        this.showLoading(false);
        forceHideLoadingOverlay();
        Swal.fire({
          icon: 'error',
          title: 'Accesso Google Sheet non disponibile',
          html: 'Non riesco ad aprire il foglio.<br><br><b>Errore:</b> ' + String(_pingErr),
          confirmButtonText: 'OK'
        });
        return;
      }
      if (_dataErr || !_dataRes) { this.onError(_dataErr || 'Dati non ricevuti'); return; }
      if (_naviRes && _naviRes.ok) _dataRes.navi = _naviRes.navi || [];
      this.onDataLoaded(_dataRes);
    };

    google.script.run
      .withSuccessHandler(() => { _pingOk = true; tryFinish_(); })
      .withFailureHandler((e) => { _pingErr = e; tryFinish_(); })
      .api_ping();

    google.script.run
      .withSuccessHandler((res) => { _dataRes = res; tryFinish_(); })
      .withFailureHandler((e) => { _dataErr = e; tryFinish_(); })
      .getOperationalData();

    google.script.run
      .withSuccessHandler((res) => { _naviRes = res; })
      .withFailureHandler(() => { _naviRes = null; })
      .api_getNavi();


$('#form-new-rimorchio').on('submit', this.handleNewRimorchio.bind(this));
    $('#form-new-mezzo').on('submit', this.handleNewMezzo.bind(this));

    

    // NAVI
    $('#form-navi').on('submit', this.handleNaviSubmit.bind(this));

    // PLANNING
    $('#form-planning').on('submit', this.handlePlanningSubmit.bind(this));

    // MAGAZZINO
    $('#form-magazzino-add').on('submit', this.handleMagazzinoAdd.bind(this));
// sidebar toggle handled in INDEX.html
  },

  // Timer per debounce del refresh server
  _refreshTimer: null,
  _refreshPending: false,

  refreshData: function() {
    // 1) Ri-renderizza SUBITO con i dati già in memoria (risposta istantanea)
    this._renderAll_();

    // 2) Debounce: una sola chiamata al server ogni 3s
    //    (se arrivano più refreshData in rapida successione, ne parte solo una)
    clearTimeout(this._refreshTimer);
    if (this._refreshPending) return; // già in volo
    this._refreshTimer = setTimeout(() => {
      this._refreshPending = true;
      google.script.run
        .withSuccessHandler((res) => {
          this._refreshPending = false;
          if (res && res.ok) {
            this.data = res;
            this._renderAll_();
            // Navi in background, non bloccante
            google.script.run
              .withSuccessHandler(r2 => { if (r2 && r2.ok) { this.data.navi = r2.navi || []; try { this.renderNavi(); } catch(e){} } })
              .withFailureHandler(() => {})
              .api_getNavi();
          }
        })
        .withFailureHandler((e) => {
          this._refreshPending = false;
          console.error('refreshData server error:', e);
        })
        .getOperationalData();
    }, 3000); // attende 3s prima di andare sul server
  },

  // Patch locale: aggiorna un rimorchio in this.data.rimorchi senza server call
  _patchRimorchio_: function(targa, fields) {
    if (!this.data || !this.data.rimorchi) return;
    const idx = this.data.rimorchi.findIndex(r => String(r.Targa) === String(targa));
    if (idx >= 0) Object.assign(this.data.rimorchi[idx], fields);
  },

  // Patch locale: aggiorna un item magazzino
  _patchMagazzino_: function(id, fields) {
    if (!this.data || !this.data.magazzino) return;
    const idx = this.data.magazzino.findIndex(m => String(m.ID) === String(id));
    if (idx >= 0) Object.assign(this.data.magazzino[idx], fields);
    else if (fields._isNew) { this.data.magazzino.push(fields); }
  },

  // Render locale di tutte le viste (senza chiamate server)
  _renderAll_: function() {
    this.showLoading(false);
    forceHideLoadingOverlay();
    try { this.renderDashboard(); } catch(e) {}
    try { this.renderAlerts(); } catch(e) {}
    try { this.renderRimorchi(); } catch(e) {}
    try { this.renderMagazzino(); } catch(e) {}
    try { this.renderPlanning(); } catch(e) {}
    try { this.renderEpal(); } catch(e) {}
    try { this.renderNavi(); } catch(e) {}
  },

  refreshNaviData: function() {
    google.script.run
      .withSuccessHandler((res) => {
        if (res && res.ok) {
          this.data.navi = res.navi || [];
          try { this.renderNavi(); } catch(e) { console.error('renderNavi error', e); }
        }
      })
      .withFailureHandler((e) => {
        // non blocca UI se manca foglio/tabella navi
        console.error('api_getNavi error', e);
      })
      .api_getNavi();
  },

  onDataLoaded: function(response) {
    this.showLoading(false);
    if (!response || !response.ok) {
    forceHideLoadingOverlay();
      Swal.fire('Errore', (response && response.error) ? response.error : 'Risposta non valida dal server', 'error');
      return;
    }

    this.data = response;

    try { this.renderDashboard(); } catch(e) { console.error('renderDashboard error', e); }
    try { this.renderAlerts(); } catch(e) { console.error('renderAlerts error', e); }
    try { this.renderRimorchi(); } catch(e) { console.error('renderRimorchi error', e); }
    try { this.renderMagazzino(); } catch(e) { console.error('renderMagazzino error', e); }
    try { this.renderPlanning(); } catch(e) { console.error('renderPlanning error', e); }
    try { this.renderEpal(); } catch(e) { console.error('renderEpal error', e); }
    try { this.initMap(); } catch(e) { console.error('initMap error', e); }
    try { this.initCalendar(); } catch(e) { console.error('initCalendar error', e); }

    // NAVI: render se già presente in data (o se la tab è aperta)
    try { this.renderNavi(); } catch(e) { console.error('renderNavi error', e); }
  },

  onError: function(error) {
    this.showLoading(false);
    forceHideLoadingOverlay();
    Swal.fire('Errore Server', String(error), 'error');
  },

  showLoading: function(show) {
    const $o = $('#loading-overlay');
    if (!$o.length) return;
    if (show) {
      $o.addClass('is-active');
      $o.css('pointer-events','all');
      $o.stop(true, true).css('display', 'flex').hide().fadeIn(120);
    } else {
      $o.stop(true, true).fadeOut(120, function() {
        $o.removeClass('is-active');
        $o.css({'display':'none','pointer-events':'none'});
      });
    }
  },


  // =========================================================
  // ALIAS: loadAll -> refreshData (chiamato da duplicateMagazzino, duplicatePlanning)
  // =========================================================
  loadAll: function() {
    return this.refreshData();
  },

  // Auto-salva in rubrica mittenti/destinatari nuovi trovati nel cargo
  _autoSaveToRubrica_: function(cargo) {
    try {
      if (!Array.isArray(cargo)) return;
      const known = new Set((_rubrica || []).map(r => (r.nome||'').toLowerCase().trim()));
      const toAdd = [];
      cargo.forEach(it => {
        const mitt = (it.Mittente || '').trim();
        const dest = (it.Destinatario || it.destinatario || '').trim();
        if (mitt && !known.has(mitt.toLowerCase())) {
          known.add(mitt.toLowerCase());
          toAdd.push({ nome: mitt, indirizzo: it.mittIndirizzoConsegna||'', citta: it.mittCittaConsegna||'',
                       provincia: it.mittProvinciaConsegna||'', telefono: it.mittTelefono||'', tipo: 'Mittente' });
        }
        if (dest && !known.has(dest.toLowerCase())) {
          known.add(dest.toLowerCase());
          toAdd.push({ nome: dest, indirizzo: it.indirizzoConsegna||'', citta: it.cittaConsegna||'',
                       provincia: it.provinciaConsegna||'', telefono: it.telefono||'', tipo: 'Destinatario' });
        }
      });
      toAdd.forEach(entry => {
        google.script.run
          .withSuccessHandler(res => {
            if (res && res.ok) {
              entry.id = res.id;
              _rubrica.push(entry);
              _rubrica.sort((a,b) => a.nome.localeCompare(b.nome,'it'));
            }
          })
          .api_upsertRubricaIndirizzo(entry);
      });
    } catch(e) { console.warn('_autoSaveToRubrica_', e); }
  },

  // Toast: notifica leggera (fallback a Swal se non disponibile)
  toast: function(msg, isError) {
    if (window.Swal) {
      Swal.fire({
        toast: true,
        position: 'bottom-end',
        icon: isError ? 'error' : 'success',
        title: String(msg || ''),
        showConfirmButton: false,
        timer: 2500,
        timerProgressBar: true
      });
    } else {
      console.log((isError ? '[ERR] ' : '[OK] ') + msg);
    }
  },

  toggleSidebar: function(force){
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    if(!sb) return;
    if(force === true) sb.classList.add('active');
    else if(force === false) sb.classList.remove('active');
    else sb.classList.toggle('active');
    if(ov) ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
  },
  closeSidebar: function(){
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    if(sb) sb.classList.remove('active');
    if(ov) ov.style.display = 'none';
  },

  detMobTab: function(tab) {
    try {
      var left  = document.getElementById('det-left-col');
      var right = document.getElementById('det-right-col');
      var btns  = document.querySelectorAll('.det-mob-tab-btn');
      btns.forEach(function(b){ b.classList.remove('active'); });
      if (tab === 'info') {
        if (left)  { left.style.setProperty('display','flex','important'); left.style.flexDirection = 'column'; left.classList.add('mob-panel-active'); }
        if (right) { right.style.display = 'none'; right.classList.remove('mob-panel-active'); }
        var b = document.getElementById('det-mob-btn-info');
        if(b) b.classList.add('active');
      } else {
        if (left)  { left.style.display  = 'none'; left.classList.remove('mob-panel-active'); }
        if (right) { right.style.setProperty('display','flex','important'); right.style.flexDirection = 'column'; right.classList.add('mob-panel-active'); }
        var b2 = document.getElementById('det-mob-btn-' + tab);
        if(b2) b2.classList.add('active');
        var targets = { merce:'#det-tab-merce', magazzino:'#det-tab-magazzino', abbinamenti:'#det-tab-abbinamenti' };
        var target = targets[tab];
        if (target) {
          var tabBtn = document.querySelector('[data-bs-target="' + target + '"]');
          if (tabBtn && !tabBtn.classList.contains('active')) tabBtn.click();
          if (tab === 'abbinamenti') { try { this.loadPairingsInline(); } catch(e){} }
        }
      }
    } catch(e) { console.error('detMobTab', e); }
  },

  // Swipe orizzontale sul modal dettagli per cambiare pannello su mobile
  _initMobSwipe_: function() {
    var modal = document.getElementById('modalDetails');
    if (!modal) return;
    var startX = 0, startY = 0;
    modal.addEventListener('touchstart', function(e) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    modal.addEventListener('touchend', function(e) {
      if (window.innerWidth >= 768) return;
      var dx = e.changedTouches[0].clientX - startX;
      var dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)) return;
      var tabs = ['info','merce','magazzino','abbinamenti'];
      var active = document.querySelector('.det-mob-tab-btn.active');
      if (!active) return;
      var curId = active.id.replace('det-mob-btn-','');
      var idx = tabs.indexOf(curId);
      if (dx < 0 && idx < tabs.length - 1) window.app && app.detMobTab(tabs[idx + 1]);
      if (dx > 0 && idx > 0) window.app && app.detMobTab(tabs[idx - 1]);
    }, { passive: true });
  },

  _initMobDetTabs_: function() {
    try {
      var isMob = window.innerWidth < 768;
      var mobTabs = document.getElementById('det-mob-tabs');
      var left  = document.getElementById('det-left-col');
      var right = document.getElementById('det-right-col');
      if (isMob) {
        if (mobTabs) mobTabs.style.display = '';
        // Mobile: mostra solo il pannello info (sinistra) di default
        if (left)  { left.style.setProperty('display','flex','important'); left.style.flexDirection = 'column'; left.classList.add('mob-panel-active'); }
        if (right) { right.style.display = 'none'; right.classList.remove('mob-panel-active'); }
        document.querySelectorAll('.det-mob-tab-btn').forEach(function(b){ b.classList.remove('active'); });
        var ib = document.getElementById('det-mob-btn-info');
        if(ib) ib.classList.add('active');
      } else {
        // Desktop/tablet: entrambi visibili
        if (mobTabs) mobTabs.style.display = 'none';
        if (left)  { left.style.setProperty('display','flex','important'); left.style.flexDirection = 'column'; left.classList.add('mob-panel-active'); }
        if (right) { right.style.setProperty('display','flex','important'); right.style.flexDirection = 'column'; right.classList.add('mob-panel-active'); }
        // Forza layout dopo ogni apertura
        try { this._forceDetLayout_(); } catch(e) {}
      }
    } catch(e) { console.error('_initMobDetTabs_', e); }
  },

  showTab: function(tabName) {
    $('.view-section').addClass('d-none');
    $('#view-' + tabName).removeClass('d-none');
    $('.nav-link').removeClass('active');
    $(`.nav-link[onclick*="'${tabName}'"]`).addClass('active');

    if (tabName === 'mappa' && this.state.map) this.state.map.invalidateSize();
    if (tabName === 'calendario' && this.state.calendar) this.state.calendar.render();

    
    if (tabName === 'alerts') { try { this.renderAlertsPage(); } catch(e) { console.error('renderAlertsPage', e);} }
if (tabName === 'navi') {
      try { this.refreshNaviData(); } catch(e) { console.error(e); }
    }
    if (tabName === 'carichi') { try{ this.renderCargoView(); }catch(e){} }
    if (tabName === 'epal') { try { this.refreshPalletLedger('EPAL'); } catch(e) { console.error(e); } }
    if (tabName === 'lff') { try { this.refreshPalletLedger('LFF'); } catch(e) { console.error(e); } }
    if (tabName === 'cvr') { try { this.refreshPalletLedger('CVR'); } catch(e) { console.error(e); } }
    if (tabName === 'impostazioni') { try { this.loadImpostazioni(); } catch(e) { console.error(e); } }

    // Sync bottom nav su mobile
    try { this.syncMobNav_(tabName); } catch(e) {}

    // Chiudi sidebar su mobile dopo navigazione
    if (window.innerWidth < 768) {
      const sb = document.getElementById('sidebar');
      if (sb && sb.classList.contains('active')) sb.classList.remove('active');
    }
  },

  syncMobNav_: function(tabName) {
    const map = { dashboard: 'mob-btn-dashboard', rimorchi: 'mob-btn-rimorchi',
                  magazzino: 'mob-btn-magazzino', impostazioni: 'mob-btn-impostazioni' };
    document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
    const id = map[tabName];
    if (id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }
  },

  setMobActive: function(btn) {
    document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
  },

  toggleMobMenu: function(btn) {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    if (!sb) return;
    sb.classList.toggle('active');
    const isOpen = sb.classList.contains('active');
    if(ov) ov.style.display = isOpen ? 'block' : 'none';
    btn.classList.toggle('active', isOpen);
  },

  
  bindDashboardFilters: function() {
    // Click su raggruppamenti dashboard -> filtro rapido rimorchi
    $(document).off('click', '.dash-filter-item').on('click', '.dash-filter-item', (ev) => {
      const li = $(ev.currentTarget);
      const field = li.data('filterField');
      const value = li.data('filterValue');
      if (!field) return;
      this.applyRimorchiQuickFilter(field, value);
    });
  },

  optimizeStopOrder: function() {
    const stops = (this.state.vm && this.state.vm.stops) ? this.state.vm.stops : [];
    const payload = stops.map(s => {
      const addr = [s.indirizzo, s.citta, s.provincia].filter(Boolean).join(', ');
      return { address: addr, label: (s.destinatario || '') };
    }).filter(x => String(x.address||'').trim().length > 0);

    if (payload.length < 2) {
    forceHideLoadingOverlay();
      Swal.fire('Info', 'Servono almeno 2 scarichi con indirizzo completo per ottimizzare.', 'info');
      return;
    }

    this.showLoading(true);
    google.script.run
      .withSuccessHandler((res) => {
        this.showLoading(false);
        if (!res || !res.ok) {
    forceHideLoadingOverlay();
          Swal.fire('Errore', (res && res.error) ? res.error : 'Errore ottimizzazione', 'error');
          return;
        }
        const order = res.order || [];
        const old = [...stops];
        const reordered = order.map(i => old[i]).filter(Boolean);
        if (reordered.length === old.length) {
          this.state.vm.stops = reordered;
          if (this.renumberStops_) this.renumberStops_();
          this.state.vm.currentStop = 0;
          if (this.renderManualTripEditor_) this.renderManualTripEditor_();
    forceHideLoadingOverlay();
          Swal.fire('OK', 'Ordine scarico aggiornato', 'success');
        } else {
    forceHideLoadingOverlay();
          Swal.fire('Info', 'Non è stato possibile riordinare tutti gli scarichi.', 'info');
        }
      })
      .withFailureHandler((e) => {
        this.showLoading(false);
    forceHideLoadingOverlay();
        Swal.fire('Errore', String(e), 'error');
      })
      .api_optimizeStopOrder(payload);
  },


  openVmGoogleMapsRoute_: function() {
    const stops = (this.state.vm && this.state.vm.stops) ? this.state.vm.stops : [];
    const addrs = stops.map(s => [s.indirizzoConsegna || s.indirizzo || '', s.cittaConsegna || s.citta || '', s.provinciaConsegna || s.provincia || ''].filter(Boolean).join(', ')).filter(x => String(x).trim().length>0);
    forceHideLoadingOverlay();
    if (addrs.length < 1) { Swal.fire('Info', 'Nessun indirizzo disponibile.', 'info'); return; }
    // Google Maps Directions: origin + destination + waypoints
    const origin = addrs[0];
    const destination = addrs[addrs.length-1];
    const waypoints = addrs.slice(1, -1).map(a => encodeURIComponent(a)).join('|');
    let url = 'https://www.google.com/maps/dir/?api=1'
      + '&origin=' + encodeURIComponent(origin)
      + '&destination=' + encodeURIComponent(destination);
    if (waypoints) url += '&waypoints=' + waypoints;
    window.open(url, '_blank');
  },

  bindKpiFilters: function() {
    // KPI click -> filtri rapidi
    const map = {
      total: null,
      viaggio: { field: 'stato', value: 'CARICO' },
      free: { field: 'stato', value: 'VUOTO' },
      maint: { field: 'stato', value: 'MANUTENZIONE' }
    };

    const safeBind = (sel, action) => {
      const el = document.querySelector(sel);
      if (!el) return;
      const card = el.closest('.kpi-card') || el;
      card.style.cursor = 'pointer';
      card.onclick = (ev) => {
        ev.preventDefault();
        if (action === 'epal') { this.showTab('epal'); return; }
        if (!action) { this.clearRimorchiQuickFilter(); this.showTab('rimorchi'); return; }
        this.applyRimorchiQuickFilter(action.field, action.value);
      };
    };

    safeBind('#kpi-total', map.total);
    safeBind('#kpi-viaggio', map.viaggio);
    safeBind('#kpi-free', map.free);
    safeBind('#kpi-maint', map.maint);
    safeBind('#kpi-epal', 'epal');
  },


  applyRimorchiQuickFilter: function(field, value) {
    this.state.quickFilter = { field, value };
    $('#search-rimorchi').val(''); // evita conflitto col filtro targa
    this.showTab('rimorchi');
    this.renderRimorchi();
  },

  clearRimorchiQuickFilter: function() {
    this.state.quickFilter = null;
    $('#rimorchi-quickfilter').empty();
    this.renderRimorchi();
  },

renderDashboard: function() {
  const rimorchi = this.data.rimorchi || [];
  $('#kpi-total').text(rimorchi.length);
  $('#kpi-viaggio').text(rimorchi.filter(r => this.statoNorm_(r.Stato) === 'CARICO').length);
  $('#kpi-free').text(rimorchi.filter(r => this.statoNorm_(r.Stato) === 'VUOTO').length);
  $('#kpi-maint').text(rimorchi.filter(r => this.statoNorm_(r.Stato) === 'MANUTENZIONE').length);

  const countBy = (arr, keyFn) => {
    const m = {};
    (arr || []).forEach(x => {
      const k = keyFn(x) || 'Sconosciuto';
      m[k] = (m[k] || 0) + 1;
    });
    return m;
  };

  const parsePort = (pos) => {
    return this.portoNorm_(pos);
  };

  const byStato = countBy(rimorchi, r => this.statoNorm_(r.Stato));
  const byPos = countBy(rimorchi, r => this.posNorm_(r['Posizione Rimorchio']));
  const byPort = countBy(rimorchi, r => parsePort(r['Posizione Rimorchio']));

  // Autista: prima da Rimorchi (Autista Carico/Giacenza/Scarico), poi dal trattore collegato
  const mezzi = this.data.mezzi || [];
  const byAutista = countBy(rimorchi, r => this.autistaNorm_(r.Trattore, r));


  const renderList = (ulSel, mapObj, emptyMsg, filterField) => {
    const ul = $(ulSel);
    if (!ul.length) return;
    ul.empty();
    const entries = Object.entries(mapObj || {}).sort((a,b) => b[1] - a[1]);
    if (!entries.length) {
      ul.html(`<li class="list-group-item text-muted">${this.escapeHtml(emptyMsg || 'Nessun dato')}</li>`);
      return;
    }
    entries.forEach(([k,v]) => {
      ul.append(`
        <li class="list-group-item d-flex justify-content-between align-items-center dash-filter-item" role="button"
            data-filter-field="${this.escapeHtml(filterField || '')}"
            data-filter-value="${this.escapeHtml(String(k))}">
          <span>${this.escapeHtml(k)}</span>
          <span class="badge bg-primary rounded-pill">${v}</span>
        </li>
      `);
    });
  };

  renderList('#dash-group-stato', byStato, 'Nessun rimorchio', 'stato');
  renderList('#dash-group-pos', byPos, 'Nessuna posizione', 'pos');
  renderList('#dash-group-porto', byPort, 'Nessun porto (usa formato: (CVT= CIVITAVECCHIA))', 'porto');
  renderList('#dash-group-autista', byAutista, 'Nessun autista (rimorchi agganciati)', 'autista');

  try { this.bindDashboardFilters(); } catch(e) { console.error('bindDashboardFilters', e); }
},

  filterRimorchi: function(query) {
    query = (query || '').toLowerCase();
    const qf = this.state.quickFilter;

    $('.trailer-item').each(function() {
      const el = $(this);
      const targa = String(el.data('targa') || '').toLowerCase();

      // Filtro testo (targa)
      let ok = targa.includes(query);

      // Filtro rapido (dashboard)
      if (ok && qf && qf.field) {
        const v = String(qf.value || '').trim();
        if (qf.field === 'stato') ok = String(el.data('stato') || '').trim() === v;
        if (qf.field === 'pos') ok = String(el.data('pos') || '').trim() === v;
        if (qf.field === 'porto') ok = String(el.data('porto') || '').trim() === v;
        if (qf.field === 'autista') ok = String(el.data('autista') || '').trim() === v;
      }

      el.toggle(ok);
    });
  },

    if (!item) { Swal.fire('Errore', 'Elemento non trovato', 'error'); return; }

    // Pre-riempi il form magazzino con i dati esistenti
    this.openMagazzinoAddModal();

      };

      // Tipo chip
      this.mzSelectTipo_(String(item['Tipo Merce'] || 'ALTRO').toUpperCase());

      set('Cliente', item.Cliente);
      set('MittIndirizzoConsegna', item.MittIndirizzoConsegna || item['Mitt Indirizzo'] || '');
      set('MittCittaConsegna',     item.MittCittaConsegna     || item['Mitt Citta'] || '');
      set('MittProvinciaConsegna', item.MittProvinciaConsegna || item['Mitt Provincia'] || '');
      set('MittTelefono',          item.MittTelefono          || item['Mitt Telefono'] || '');
      set('Destinazione', item.Destinazione);
      set('IndirizzoConsegna', item.IndirizzoConsegna || item['Indirizzo Consegna'] || '');
      set('CittaConsegna',     item.CittaConsegna     || item['Citta Consegna'] || '');
      set('ProvinciaConsegna', item.ProvinciaConsegna || item['Provincia Consegna'] || '');
      set('Telefono',          item.Telefono          || '');
      set('Materiale', item.Materiale);
      set('KG', item.KG);
      set('Colli', item.Colli);
      set('Lunghezza (m)', item['Lunghezza (m)']);
      set('Larghezza (m)', item['Larghezza (m)']);
      set('Altezza (m)', item['Altezza (m)']);
      set('Diametro (m)', item['Diametro (m)']);
      set('Stato', item.Stato);
      set('Note', item.Note);
      set('Tratta Nave ID', item['Tratta Nave ID']);

      const toInputDate = (v) => {
        if (!v) return '';
        const d = new Date(v);
        if (isNaN(d)) return '';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      };
      set('Data Carico', toInputDate(item['Data Carico']));
      set('Data Consegna', toInputDate(item['Data Consegna']));
      set('Data Tassativa', toInputDate(item['Data Tassativa']));

      // Cambia il submit per fare UPDATE invece di INSERT
      const form = document.getElementById('form-magazzino-add');
      form.dataset.editId = id;
      const btn = form.querySelector('[type="submit"]');
      if (btn) btn.innerHTML = '<i class="fas fa-save me-1"></i> Aggiorna';
    };
    setTimeout(fill, 350);
  },

  /* Applica selezione tipo merce nel form magazzino */
  mzSelectTipo_: function(tipo) {
    // Aggiorna hidden field
    const hid = document.getElementById('mz-tipo-value');
    if (hid) hid.value = tipo;

    // Aggiorna stato visivo chip
    document.querySelectorAll('.mz-tipo-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tipo === tipo);
    });

    // Regole campi misura (identiche all'editor rimorchio)
    const isSfuso        = ['SFUSO','MERCE SFUSA','GRANO'].includes(tipo);
    const isLamieraTubi  = ['LAMIERA','TUBI','FERRO'].includes(tipo);
    const isPedane       = tipo === 'PEDANE';
    const isBobine       = tipo === 'BOBINE';
    const isMac          = tipo === 'MACCHINARIO';

    const show = (cls, visible) => {
      document.querySelectorAll(`.${cls}`).forEach(el => {
        el.style.display = visible ? '' : 'none';
        // disabilita input per non mandare valore vuoto nel payload se nascosto
        el.querySelectorAll('input').forEach(i => { i.disabled = !visible; });
      });
    };

    show('mz-field-l',    isLamieraTubi);
    show('mz-field-w',    isLamieraTubi || isPedane);
    show('mz-field-h',    isLamieraTubi || isPedane);
    show('mz-field-d',    isBobine);
    show('mz-field-colli', !isSfuso);

    // Placeholder descrizione contestuale
    const matEl = document.getElementById('mz-materiale');
    if (matEl) {
      const hints = {
        SFUSO:'Es. frumento duro, mais, orzo…',
        FERRO:'Es. profilati HEA 200, angolari…',
        LAMIERA:'Es. lamiera S235 spess. 4mm, 12x2m',
        TUBI:'Es. tubi zincati Ø120 6m',
        PEDANE:'Es. pedane EUR 120x80 / LLF 120x100',
        BOBINE:'Es. bobine nastro 0,7mm largh. 1250',
        MACCHINARIO:'Es. compressore 5t, gru a torre',
        ALTRO:'Descrizione merce'
      };
      matEl.placeholder = hints[tipo] || hints.ALTRO;
    }

    // Hint tipo
    const hintEl = document.getElementById('mz-tipo-hint');
    if (hintEl) {
      const campi = {
        SFUSO:'Solo KG totali — nessuna misura richiesta.',
        FERRO:'Richiede lunghezza (m) · larghezza · altezza.',
        LAMIERA:'Richiede lunghezza · larghezza · altezza.',
        TUBI:'Richiede lunghezza (m) · larghezza · altezza.',
        PEDANE:'Richiede larghezza e altezza (ingombro piana).',
        BOBINE:'Richiede diametro Ø (m) e KG.',
        MACCHINARIO:'Solo KG — inserisci descrizione dettagliata.',
        ALTRO:'Compila i campi disponibili.'
      };
      hintEl.textContent = campi[tipo] || '';
    }
  },

  handleMagazzinoAdd: function(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    const payload = Object.fromEntries(formData.entries());
    const editId = form.dataset.editId || '';

    this.showLoading(true);
    $('#modalMagazzinoAdd').modal('hide');

    if (editId) {
      // ── MODALITÀ MODIFICA: aggiorna tutti i campi via api_updateCell ──
      delete form.dataset.editId;
      const btn = form.querySelector('[type="submit"]');
      if (btn) btn.innerHTML = '<i class="fas fa-save me-1"></i> Salva in Magazzino';

      const fields = ['Cliente','MittIndirizzoConsegna','MittCittaConsegna','MittProvinciaConsegna','MittTelefono',
        'Destinazione','IndirizzoConsegna','CittaConsegna','ProvinciaConsegna','Telefono',
        'Materiale','KG','Colli',
        'Lunghezza (m)','Larghezza (m)','Altezza (m)','Diametro (m)',
        'Stato','Note','Tratta Nave ID','Data Carico','Data Consegna','Data Tassativa','Tipo Merce'];
      const meta = { userEmail: (this.state && this.state.userEmail) || '—' };

      // Chiama updateCell per ogni campo in parallelo, poi refreshData
      let pending = fields.length;
      let anyErr = null;
      fields.forEach(f => {
        google.script.run
          .withSuccessHandler(res => {
            if (!res || !res.ok) anyErr = (res && res.error) || 'Errore';
            if (--pending === 0) {
              forceHideLoadingOverlay();
              if (anyErr) Swal.fire('Errore parziale', anyErr, 'warning');
              else Swal.fire({ title: 'Aggiornato', icon: 'success', timer: 1400, showConfirmButton: false });
              form.reset();
              try { this.mzSelectTipo_('ALTRO'); } catch(_) {}
              this.refreshData();
            }
          })
          .withFailureHandler(err => {
            anyErr = String(err);
            if (--pending === 0) {
              forceHideLoadingOverlay();
              Swal.fire('Errore', anyErr, 'error');
              this.showLoading(false);
            }
          })
          .api_updateCell('MAGAZZINO', editId, f, payload[f] !== undefined ? payload[f] : '', meta);
      });
    } else {
      // ── MODALITÀ INSERIMENTO ──
      google.script.run
        .withSuccessHandler((res) => {
          if (res && res.ok) {
            forceHideLoadingOverlay();
            Swal.fire({ title: 'Salvato', text: 'Merce inserita in magazzino', icon: 'success', timer: 1600, showConfirmButton: false });
            form.reset();
            try { this.mzSelectTipo_('ALTRO'); } catch(_) {}
            this.refreshData();
          } else {
            forceHideLoadingOverlay();
            Swal.fire('Errore', (res && res.error) ? res.error : 'Errore sconosciuto', 'error');
            this.showLoading(false);
          }
        })
        .withFailureHandler(this.onError.bind(this))
        .api_addMagazzinoItem(payload);
    }
  },

  initMap: function() {
    if (this.state.map) return;
    const el = document.getElementById('map-view');
    if (!el) return;

    this.state.map = L.map('map-view').setView([41.9028, 12.4964], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(this.state.map);

    const rimorchi = this.data.rimorchi || [];
    const rubrica = this.data.rubrica || [];

    rimorchi.forEach(r => {
      const posName = r['Posizione Rimorchio'];
      const location = rubrica.find(l => l.Città === posName || l.Nome === posName);
      if (location && location.Lat && location.Lng) {
        L.marker([Number(location.Lat), Number(location.Lng)])
          .addTo(this.state.map)
          .bindPopup(`<b>${this.escapeHtml(r.Targa)}</b><br>${this.escapeHtml(r.Stato || '')}`);
      }
    });
  },

  initCalendar: function() {
    const el = document.getElementById('calendar-view');
    if (!el) return;

    if (this.state.calendar) {
      this.state.calendar.removeAllEvents();
      this.getCalendarEvents().forEach(ev => this.state.calendar.addEvent(ev));
      return;
    }

    this.state.calendar = new FullCalendar.Calendar(el, {
      initialView: 'dayGridMonth',
      headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listWeek' },
      events: this.getCalendarEvents()
    });
    this.state.calendar.render();
  },

  getCalendarEvents: function() {
    const events = [];
    const rimorchi = this.data.rimorchi || [];
    const planning = this.data.planning || [];

    
rimorchi.forEach(r => {
  if (r['Scadenza Revisione']) events.push({ title: `Revisione ${r.Targa}`, start: r['Scadenza Revisione'], color: 'red' });
  if (r['Scadenza Assicurazione']) events.push({ title: `Assicurazione ${r.Targa}`, start: r['Scadenza Assicurazione'], color: 'orange' });
});
    planning.forEach(p => {
      if (p.DataPrevista) events.push({ title: `Viaggio ${p.Destinazione || ''}`, start: p.DataPrevista, color: 'blue' });
    });
    return events;
  },

  toInputDateTime_: function(v) {
    if (!v) return '';
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v);
    const pad = (n)=> String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  },

      this._patchRimorchio_(targa, fields);

    this.clearSelection();
    this._renderAll_();
    this.toast(`Aggiornati ${ids.length} rimorchi ✓`);
    google.script.run
      .withSuccessHandler((res) => {
        forceHideLoadingOverlay();
        if (!res || !res.ok) Swal.fire('Errore', (res && res.error) ? res.error : 'Errore sconosciuto', 'error');

  /* Inizializza contenuto tab dopo che il modal è visibile */
  _initDetailsModalContent_: function(cargoJson) {
    // ─── Popola magazzino tab ─────────────────────────────────────────────
    const stock = (this.data.magazzino || []).filter(m =>
      !['SPEDITO','CONSEGNATO'].includes(String(m.Stato || '').toUpperCase())
    );
    const list = $('#stock-list');
    list.empty();
    if (!stock.length) {
      list.html('<div class="text-muted small p-2">Nessuna merce disponibile in magazzino</div>');
    } else {
      const TIPO_COLORS = {
        SFUSO:'background:#dbeafe;color:#1e3a5f', FERRO:'background:#fce7f3;color:#701a44',
        LAMIERA:'background:#fce7f3;color:#701a44', TUBI:'background:#fce7f3;color:#701a44',
        PEDANE:'background:#dcfce7;color:#14532d', BOBINE:'background:#fef3c7;color:#78350f',
        MACCHINARIO:'background:#ede9fe;color:#3730a3', ALTRO:'background:#f3f4f6;color:#374151'
      };
      stock.forEach(item => {
        const tipo = String(item['Tipo Merce'] || 'ALTRO').toUpperCase();
        const col = TIPO_COLORS[tipo] || TIPO_COLORS.ALTRO;
        const tass = item['Data Tassativa'] ? new Date(item['Data Tassativa']) : null;
        const tassStr = tass && !isNaN(tass) ? tass.toLocaleDateString('it') : '';
        const tassUrgente = tass && !isNaN(tass) && ((tass - Date.now()) / 86400000) <= 3;
        list.append(`
          <label class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-2">
            <input class="form-check-input flex-shrink-0 stock-select" type="checkbox" value="${this.escapeHtml(item.ID)}">
            <span class="badge rounded-pill fw-bold" style="${col};padding:3px 9px;font-size:.7rem">${this.escapeHtml(tipo)}</span>
            <span class="flex-grow-1 min-width-0">
              <div class="fw-semibold text-truncate" title="${this.escapeHtml(item.Materiale||'')}">${this.escapeHtml(item.Materiale||'—')}</div>
              <div class="text-muted small">${this.escapeHtml(item.Destinazione||'')}${item.Cliente ? ' · '+this.escapeHtml(item.Cliente) : ''}</div>
            </span>

  handleManualLoad: function(e) {
    e.preventDefault();
    const targa = $('#load-targa-manual').val();
    const formData = new FormData(e.target);
    const payload = Object.fromEntries(formData.entries());

    this.showLoading(true);
    google.script.run
      .withSuccessHandler((res) => {
        if (res && res.ok) {
    forceHideLoadingOverlay();
          Swal.fire('Caricato', 'Merce caricata', 'success');
          $('#modalDetails').modal('hide');
          e.target.reset();
          this.refreshData();
        } else {
    forceHideLoadingOverlay();
          Swal.fire('Errore', (res && res.error) ? res.error : 'Errore sconosciuto', 'error');
          this.showLoading(false);
        }
      })
      .withFailureHandler(this.onError.bind(this))
      .caricoManualeImmediato(targa, payload);
  },

  initManualTripEditor: function(cargoJson) {
    const targa = this.state.currentTrailer || '';
    $('#load-targa-manual').val(targa);

    const grouped = this.groupCargoByStop_(cargoJson || []);
    this.state.vm = {
      originalCargo: JSON.parse(JSON.stringify(cargoJson || [])),
      stops: grouped,
      currentStop: 0
    };

    if (!this.state.vm.stops.length) {
      this.state.vm.stops.push(this.emptyStop_({ ordineScarico: '1' }));
      this.state.vm.currentStop = 0;
    }

    this.bindManualTripEvents_();
    this.renderManualTripEditor_();

  bindManualTripEvents_: function() {
    // evita multi-bind
    $(document).off('change', '#vm-stop-select')
      .on('change', '#vm-stop-select', (e) => {
        const idx = Number($(e.currentTarget).val() || 0);
        this.state.vm.currentStop = isNaN(idx) ? 0 : idx;
        this.renderManualTripEditor_();
      });

    $(document).off('click', '#vm-add-stop').on('click', '#vm-add-stop', () => {
      const n = this.state.vm.stops.length + 1;
      this.state.vm.stops.push(this.emptyStop_({ ordineScarico: String(n) }));
      this.state.vm.currentStop = this.state.vm.stops.length - 1;
      this.renderManualTripEditor_();
    });

    $(document).off('click', '#vm-remove-stop').on('click', '#vm-remove-stop', () => {
      if (!this.state.vm.stops.length) return;
      if (this.state.vm.stops.length === 1) {
        this.state.vm.stops[0] = this.emptyStop_({ ordineScarico: '1' });
        this.state.vm.currentStop = 0;
        this.renderManualTripEditor_();
        return;
      }
      this.state.vm.stops.splice(this.state.vm.currentStop, 1);
      this.state.vm.currentStop = Math.max(0, this.state.vm.currentStop - 1);
      this.renumberStops_();

  applyVmFieldRules_: function() {
    // Nell'editor unificato i KG sono SEMPRE editabili (non esistono più qty/kg_unit visibili)
    $('#vm-items-body tr').each((i, tr) => {
      const $tr = $(tr);
      const tipo = String($tr.find('.vm-item-tipo, .vue-tipo-select').val() || '').toUpperCase();
      const setDis = (sel, dis) => $tr.find(sel).prop('disabled', !!dis).css('opacity', dis ? '0.35' : '');

      const isSfuso = ['SFUSO','MERCE SFUSA','GRANO'].includes(tipo);
      const isLamieraTubi = ['LAMIERA','TUBI','FERRO'].includes(tipo);
      const isPedane = tipo === 'PEDANE';
      const isBobine = tipo === 'BOBINE';
      const isMac = tipo === 'MACCHINARIO';

      // KG: SEMPRE abilitati per tutti i tipi
      setDis('.vm-item-kgtot', false);

      // Misure: abilita solo quelle rilevanti per il tipo
      // L: lamiera/tubi/ferro
      setDis('.vm-item-l', !(isLamieraTubi));
      // W: pedane, lamiera
      setDis('.vm-item-w', !(isPedane || isLamieraTubi));
      // H: pedane, lamiera
      setDis('.vm-item-h', !(isPedane || isLamieraTubi));
      // D (diametro): bobine
      setDis('.vm-item-d', !(isBobine));

      // Colli: non per sfuso
      setDis('.vm-item-colli', isSfuso);

      // Descrizione auto per sfuso
      if (isSfuso && !$tr.find('.vm-item-desc').val()) $tr.find('.vm-item-desc').val('MERCE SFUSA');

      // Placeholder KG contestuale
      const kgEl = $tr.find('.vm-item-kgtot')[0];
      if (kgEl && !kgEl.value) {
        kgEl.placeholder = isSfuso ? 'ton.' : isLamieraTubi ? 'calc.' : '0';
      }
    });
  },


  emptyStop_: function(seed) {
    const o = seed || {};
    return {
      Mittente: o.Mittente || '',
      mittIndirizzoConsegna: o.mittIndirizzoConsegna || '',
      mittCittaConsegna:     o.mittCittaConsegna || '',
      mittProvinciaConsegna: o.mittProvinciaConsegna || '',
      mittTelefono:          o.mittTelefono || '',
      Destinatario: o.Destinatario || '',
      indirizzoConsegna: o.indirizzoConsegna || '',
      cittaConsegna: o.cittaConsegna || '',
      provinciaConsegna: o.provinciaConsegna || '',
      telefono: o.telefono || '',
      ordineScarico: o.ordineScarico || '',
      dataTassativaStop: o.dataTassativaStop || '',
      naveTripId: o.naveTripId || '',
      items: (o.items && o.items.length) ? o.items : [{ id: '', descrizione: '', tipoMerce: '', lunghezza_m:'', larghezza_m:'', altezza_m:'', diametro_m:'', KG: '', colli: '' }]
    };
  },

  renumberStops_: function() {
    // se ordineScarico è vuoto o duplicato, assegna progressivo
    const used = new Set();
    this.state.vm.stops.forEach((s, i) => {
      let ord = String(s.ordineScarico || '').trim();
      if (!ord || used.has(ord)) ord = String(i + 1);
      s.ordineScarico = ord;
      used.add(ord);
    });
  },

  getCurrentStop_: function() {
    const vm = this.state.vm || { stops: [] };
    if (!vm.stops.length) vm.stops.push(this.emptyStop_({ ordineScarico: '1' }));
    const idx = Math.min(Math.max(0, vm.currentStop || 0), vm.stops.length - 1);
    vm.currentStop = idx;
    return vm.stops[idx];
  },

  renderManualTripEditor_: function() {
    const vm = this.state.vm;
    if (!vm) return;

    // select
    const sel = $('#vm-stop-select');
    sel.empty();
    vm.stops.forEach((s, i) => {
      const ord = String(s.ordineScarico || (i + 1));
      const dest = (s.Destinatario || '').trim() || 'Destinatario';
      const city = (s.cittaConsegna || '').trim();
      const prov = (s.provinciaConsegna || '').trim();
      const label = `Scarico ${ord}: ${dest}${city ? (' - ' + city + (prov ? ' ' + prov : '')) : ''}`;
      sel.append(`<option value="${i}">${this.escapeHtml(label)}</option>`);
    });
    sel.val(String(vm.currentStop || 0));

    // fields
    const s = this.getCurrentStop_();
    $('#vm-mittente').val(s.Mittente || '');
    $('#vm-mitt-indirizzo').val(s.mittIndirizzoConsegna || '');
    $('#vm-mitt-citta').val(s.mittCittaConsegna || '');
    $('#vm-mitt-provincia').val(s.mittProvinciaConsegna || '');
    $('#vm-mitt-telefono').val(s.mittTelefono || '');
    $('#vm-destinatario').val(s.Destinatario || '');
    $('#vm-indirizzo').val(s.indirizzoConsegna || '');
    $('#vm-citta').val(s.cittaConsegna || '');
    $('#vm-provincia').val(s.provinciaConsegna || '');
    $('#vm-telefono').val(s.telefono || '');
    $('#vm-ordine').val(s.ordineScarico || '');
    $('#vm-tassativa').val(this.toInputDate_(s.dataTassativaStop || ''));

    // Tratte navi dropdown
    const nsel = $('#vm-nave');
    if (nsel.length) {
      const navi = (this.data.navi || []);
      nsel.empty();
      nsel.append('<option value="">Tratta nave (opzionale)</option>');
      navi.forEach(n => {
        const id = String(n.ID || '').trim();
        if (!id) return;
        const label = `${id} - ${(n['Nave/Linea']||n.Nave||'').toString().trim()} (${(n['Porto Partenza']||'').toString().trim()}→${(n['Porto Arrivo']||'').toString().trim()})`;
        nsel.append(`<option value="${this.escapeHtml(id)}">${this.escapeHtml(label)}</option>`);
      });
      nsel.val(String(s.naveTripId || ''));
    }

    // items UI
    this.renderVmItemsUI_(s);
    this.refreshVmComposerUI_();
  },

  vmComposerReadCurrent_: function() {
    const tipo = String(this.state.vmComposerTipo || '').toUpperCase();
    if (!tipo) return { ok:false, error:'Seleziona un tipo merce (Sfuso/Lamiera/Tubi/Pedane/Bobine/Macchinario).' };

    const get = (id) => (document.getElementById(id)?.value || '').toString().trim();
    const num = (v) => {
      const x = Number(String(v || '').replace(',', '.'));
      return isNaN(x) ? 0 : x;
    };

    const descrizione = get('vmc-desc') || (tipo === 'SFUSO' ? 'MERCE SFUSA' : '');
    const colli = get('vmc-colli');

    const qty = num(get('vmc-qty'));
    const kgUnit = num(get('vmc-kg-unit'));
    const kgTotRaw = num(get('vmc-kg-tot'));

    const l = num(get('vmc-l'));
    const w = num(get('vmc-w'));
    const h = num(get('vmc-h'));
    const d = num(get('vmc-d'));

    const isSfuso = (tipo === 'SFUSO' || tipo === 'MERCE SFUSA' || tipo === 'GRANO');
    const isLamieraTubi = ['LAMIERA','TUBI','FERRO'].includes(tipo);
    const isPedane = (tipo === 'PEDANE');
    const isBobine = (tipo === 'BOBINE');
    const isMac = (tipo === 'MACCHINARIO');

    // validazioni + calcoli
    let kgTot = kgTotRaw;

    if (isSfuso || isMac) {
      if (kgTot <= 0) return { ok:false, error:'Inserisci KG tot (>0).' };
    } else if (isLamieraTubi) {
      if (l <= 0) return { ok:false, error:'Per lamiera/tubi/ferro serve la Lunghezza (m) (>0).' };
      if (qty <= 0) return { ok:false, error:'Per lamiera/tubi/ferro serve la Quantità (>0).' };
      if (kgUnit <= 0) return { ok:false, error:'Per lamiera/tubi/ferro serve KG/unità (>0).' };
      kgTot = qty * kgUnit;
    } else if (isPedane) {
      if (qty <= 0) return { ok:false, error:'Per pedane serve la Quantità (>0).' };
      if (kgUnit <= 0) return { ok:false, error:'Per pedane serve KG/unità (>0).' };
      kgTot = qty * kgUnit;
    } else if (isBobine) {
      if (qty <= 0) return { ok:false, error:'Per bobine serve la Quantità (>0).' };
      if (kgUnit <= 0) return { ok:false, error:'Per bobine serve KG/unità (>0).' };
      kgTot = qty * kgUnit;
    } else {
      // Altro: accetta kg_tot oppure qty*kg_unit
      if (kgTot <= 0 && (qty > 0 && kgUnit > 0)) kgTot = qty * kgUnit;
      if (kgTot <= 0) return { ok:false, error:'Inserisci KG tot, oppure Quantità e KG/unità.' };
    }

    const item = {
      id: '',
      tipoMerce: tipo,
      descrizione,
      kg_tot: Math.round(kgTot),
      KG: Math.round(kgTot),
      qty: qty ? String(Math.round(qty)) : '',
      kg_unit: kgUnit ? String(Math.round(kgUnit)) : '',
      colli: colli || '',
      lunghezza_m: l ? String(l) : '',
      larghezza_m: w ? String(w) : '',
      altezza_m: h ? String(h) : '',
      diametro_m: d ? String(d) : '',
      Mittente: get('vmc-mitt'),
      Destinatario: get('vmc-dest'),
      indirizzoConsegna: get('vmc-addr'),
      cittaConsegna: get('vmc-city'),
      provinciaConsegna: get('vmc-prov'),
      telefono: get('vmc-tel')
    };

    return { ok:true, item };
  },

renderVmStopSummary_: function(s) {
    const items = (s && s.items) ? s.items : [];
    let totKg = 0, totColli = 0, maxLen = 0, n = 0;

      n++;
      totKg += Number(String(it.kg_tot || it.KG || '0').replace(',', '.')) || 0;
      totColli += Number(String(it.colli || '0').replace(',', '.')) || 0;
      const l = Number(String(it.lunghezza_m || '0').replace(',', '.')) || 0;
      if (l > maxLen) maxLen = l;

      pillsEl.innerHTML = n > 0 ? `

        <span class="vue-pill"><b>${Math.round(totKg).toLocaleString('it')}</b> kg</span>
        ${totColli > 0 ? `<span class="vue-pill"><b>${Math.round(totColli)}</b> colli</span>` : ''}
        ${maxLen > 0 ? `<span class="vue-pill">L max <b>${maxLen.toFixed(2)} m</b></span>` : ''}

        ${maxLen > 0 ? `<span>L max: <b>${maxLen.toFixed(2)} m</b></span>` : ''}

  buildVmItemParams_: function(it) {
    const tipo = String(it.tipoMerce || '').toUpperCase();
    const parts = [];
    const f = (v) => (v === null || v === undefined || String(v).trim()==='') ? '' : String(v).trim();

    const q = f(it.qty);
    const kgU = f(it.kg_unit);
    const kgT = f(it.kg_tot || it.KG);

    const L = f(it.lunghezza_m);
    const W = f(it.larghezza_m);
    const H = f(it.altezza_m);
    const D = f(it.diametro_m);
    const colli = f(it.colli);

    if (tipo === 'SFUSO' || tipo === 'MERCE SFUSA' || tipo === 'GRANO') {
      if (kgT) parts.push(`Peso: ${kgT} kg`);
    } else if (['LAMIERA','TUBI','FERRO'].includes(tipo)) {
      if (L) parts.push(`L: ${L} m`);
      if (q) parts.push(`Q.tà: ${q}`);
      if (kgU) parts.push(`KG/unit: ${kgU}`);
    } else if (tipo === 'PEDANE') {
      if (q) parts.push(`Pedane: ${q}`);
      if (kgU) parts.push(`KG/pedana: ${kgU}`);
      if (W || H) parts.push(`Misure: ${[W?('W '+W):'', H?('H '+H):''].filter(Boolean).join(' ')}`);
    } else if (tipo === 'BOBINE') {
      if (q) parts.push(`Bobine: ${q}`);
      if (kgU) parts.push(`KG/bobina: ${kgU}`);
      if (D) parts.push(`Ø: ${D} m`);
      if (W) parts.push(`W: ${W} m`);
    } else if (tipo === 'MACCHINARIO') {
      if (kgT) parts.push(`Peso: ${kgT} kg`);
      const dims = [L?('L '+L):'', W?('W '+W):'', H?('H '+H):''].filter(Boolean).join(' ');
      if (dims) parts.push(`Misure: ${dims}`);
    } else {
      if (L || W || H || D) parts.push(`Misure: ${[L?('L '+L):'', W?('W '+W):'', H?('H '+H):'', D?('Ø '+D):''].filter(Boolean).join(' ')}`);
      if (q) parts.push(`Q.tà: ${q}`);
      if (kgU) parts.push(`KG/unit: ${kgU}`);
      if (kgT) parts.push(`KG tot: ${kgT}`);
    }
    if (colli) parts.push(`Colli: ${colli}`);
    return parts.join(' • ');
  },

  groupCargoByStop_: function(cargo) {
    const arr = Array.isArray(cargo) ? cargo : [];
    const map = {};
    arr.forEach(it => {
      const ord = String(it.ordineScarico || it.OrdineScarico || '').trim();
      const key = [
        ord,
        (it.Mittente || '').trim(),
        (it.Destinatario || '').trim(),
        (it.indirizzoConsegna || '').trim(),
        (it.cittaConsegna || '').trim(),
        (it.provinciaConsegna || '').trim(),
        (it.telefono || '').trim()
      ].join('|');

      if (!map[key]) {
        map[key] = this.emptyStop_({
          Mittente: it.Mittente || '',
          Destinatario: it.Destinatario || '',
          indirizzoConsegna: it.indirizzoConsegna || '',
          cittaConsegna: it.cittaConsegna || '',
          provinciaConsegna: it.provinciaConsegna || '',
          telefono: it.telefono || '',
          ordineScarico: ord || '',
          dataTassativaStop: it["Data Tassativa"] || it.dataTassativa || '',
          naveTripId: it.naveTripId || it.TrattaNaveID || it.trattaNaveId || ''
        });
        map[key].items = [];
      }
      map[key].items.push({
        id: it.id || it.ID || '',
        descrizione: it.descrizione || it.Materiale || '',
        tipoMerce: it.tipoMerce || it.TipoMerce || '',
        lunghezza_m: it.lunghezza_m || it.Lunghezza_m || '',
        larghezza_m: it.larghezza_m || it.Larghezza_m || '',
        altezza_m: it.altezza_m || it.Altezza_m || '',
        diametro_m: it.diametro_m || it.Diametro_m || '',
        KG: it.KG || it.kg || '',
        colli: it.colli || ''
      });
    });

    // convert to array and sort by ordineScarico numeric
    const stops = Object.values(map);
    stops.forEach(s => { if (!s.items.length) s.items = [{ id:'', descrizione:'', KG:'', colli:'' }]; });
    stops.sort((a,b) => {
      const an = Number(String(a.ordineScarico||'').replace(/[^\d]/g,'')) || 9999;
      const bn = Number(String(b.ordineScarico||'').replace(/[^\d]/g,'')) || 9999;
      if (an !== bn) return an - bn;
      return (a.cittaConsegna||'').localeCompare(b.cittaConsegna||'');
    });
    if (!stops.length) return [];
    // se manca ordine, assegna
    this.state.vm = this.state.vm || {};
    this.state.vm.stops = stops;
    this.renumberStops_();
    return this.state.vm.stops;
  },

  buildCargoFromVm_: function() {
    const vm = this.state.vm;
    const cargo = [];
    (vm.stops || []).forEach((s) => {
      const ord = String(s.ordineScarico || '').trim();
      (s.items || []).forEach(it => {
        const desc = String(it.descrizione || '').trim();
        const kg = String(it.kg_tot || it.KG || '').trim();
        const colli = String(it.colli || '').trim();
        if (!desc && !kg && !colli) return;

        cargo.push({
          id: it.id || '',
          descrizione: desc,
          KG: kg,
          colli: colli,
          Mittente: it.Mittente || s.Mittente || '',
          mittIndirizzoConsegna: s.mittIndirizzoConsegna || '',
          mittCittaConsegna:     s.mittCittaConsegna || '',
          mittProvinciaConsegna: s.mittProvinciaConsegna || '',
          mittTelefono:          s.mittTelefono || '',
          Destinatario: it.Destinatario || s.Destinatario || '',
          indirizzoConsegna: it.indirizzoConsegna || s.indirizzoConsegna || '',
          cittaConsegna: it.cittaConsegna || s.cittaConsegna || '',
          provinciaConsegna: it.provinciaConsegna || s.provinciaConsegna || '',
          telefono: it.telefono || s.telefono || '',
          ordineScarico: ord,
          "Data Tassativa": s.dataTassativaStop || '',
          naveTripId: s.naveTripId || '',
          tipoMerce: it.tipoMerce || '',
          lunghezza_m: it.lunghezza_m || '',
          larghezza_m: it.larghezza_m || '',
          altezza_m: it.altezza_m || '',
          diametro_m: it.diametro_m || ''
        });
      });
    });
    return cargo;
  },

    const targa = this.state.currentTrailer;

  renderAlerts: function() {
    const alerts = this.data.alerts || [];
    const container = $('#alert-container');
    container.empty();

    // raggruppa per categoria
    const groups = {};
    alerts.forEach(a => {
      const cat = (a.category || 'generale');
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(a);
    });

    const catOrder = ['tassative','magazzino','porto','scadenze','generale'];
    const cats = Object.keys(groups).sort((a,b)=> (catOrder.indexOf(a)===-1?999:catOrder.indexOf(a)) - (catOrder.indexOf(b)===-1?999:catOrder.indexOf(b)));

    cats.forEach(cat => {
      container.append(`<div class="fw-bold mb-1 mt-2">${this.escapeHtml(cat.toUpperCase())}</div>`);
      groups[cat].forEach(a => {
        const cls = a.type === 'danger' ? 'alert-danger' : 'alert-warning';
        container.append(`
          <div class="alert ${cls} alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i> ${this.escapeHtml(a.msg)}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        `);
      });
    });
  },


  renderAlertsPage: function() {
    const alerts = this.data.alerts || [];
    const filter = String($('#alerts-filter').val() || 'all');
    const q = String($('#alerts-search').val() || '').toLowerCase().trim();
    const container = $('#alerts-page-container');
    container.empty();

    const filtered = alerts.filter(a => {
      const cat = String(a.category || 'generale');
      if (filter !== 'all' && cat !== filter) return false;
      if (!q) return true;
      const txt = (String(a.msg || '') + ' ' + String(a.targa || '') + ' ' + String(a.ref || '')).toLowerCase();
      return txt.includes(q);
    });

    if (!filtered.length) {
      container.html('<div class="alert alert-info">Nessun alert da mostrare.</div>');
      return;
    }

    const groups = {};
    filtered.forEach(a => {
      const cat = (a.category || 'generale');
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(a);
    });

    const catOrder = ['tassative','magazzino','porto','scadenze','generale'];
    const cats = Object.keys(groups).sort((a,b)=> (catOrder.indexOf(a)===-1?999:catOrder.indexOf(a)) - (catOrder.indexOf(b)===-1?999:catOrder.indexOf(b)));

    cats.forEach(cat => {
      container.append(`<div class="fw-bold mb-2 mt-3">${this.escapeHtml(String(cat).toUpperCase())}</div>`);
      groups[cat].forEach(a => {
        const cls = a.type === 'danger' ? 'alert-danger' : 'alert-warning';
        const extra = a.targa ? (` <span class="badge bg-secondary ms-2">${this.escapeHtml(a.targa)}</span>`) : '';
        container.append(`
          <div class="alert ${cls} d-flex align-items-start gap-2" role="alert">
            <div><i class="fas fa-exclamation-triangle"></i></div>
            <div class="flex-grow-1">
              <div>${this.escapeHtml(a.msg || '')}${extra}</div>
              ${a.when ? `<div class="small text-muted mt-1">${this.escapeHtml(a.when)}</div>` : ''}
            </div>
          </div>
        `);
      });
    });

    const tbody = $('#table-epal tbody');
    tbody.empty();

    const sorted = [...epal].sort((a, b) => new Date(b.Data) - new Date(a.Data));

    sorted.forEach(e => {
      const q = Number(e['Quantità'] || 0);
      const place = e.Luogo || 'Unknown';

      if (!balances[place]) balances[place] = 0;
      if (['DEPOSITO','ENTRATA','RITIRO'].includes(String(e['Tipo Movimento'] || '').toUpperCase())) balances[place] += q;
      else balances[place] -= q;

      const dateStr = e.Data ? new Date(e.Data).toLocaleDateString() : '';
      tbody.append(`
        <tr>
          <td>${this.escapeHtml(dateStr)}</td>
          <td><span class="badge bg-info text-dark">${this.escapeHtml(e['Operazione'] || '')}</span></td>
          <td><span class="badge bg-secondary">${this.escapeHtml(e['Tipo Movimento'] || '')}</span></td>
          <td>${this.escapeHtml(e.Luogo || '')}</td>
          <td>${this.escapeHtml(e['Quantità'] || '')}</td>
          <td>${this.escapeHtml(e['Autista_Targa'] || '')}</td>
          <td class="text-muted small">${this.escapeHtml(e.Note || '')}</td>
        </tr>

  loadPairingsInline: function() {
    const targa = this.state.currentTrailer;
    const container = document.getElementById('pairing-results');
    const infoEl = document.getElementById('pairing-trailer-info');
    if (!container) return;

    if (!targa) {
      container.innerHTML = '<div class="text-muted small">Apri i dettagli di un rimorchio per vedere i suggerimenti.</div>';
      return;
    }

    container.innerHTML = '<div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary me-2"></div><span class="small text-muted">Analisi compatibilità in corso...</span></div>';
    if (infoEl) infoEl.innerHTML = '';

    const btnRefresh = document.getElementById('btn-refresh-pairings');
    if (btnRefresh) { btnRefresh.disabled = true; btnRefresh.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Carico...'; }

    google.script.run
      .withSuccessHandler((res) => {
        if (btnRefresh) { btnRefresh.disabled = false; btnRefresh.innerHTML = '<i class="fas fa-sync-alt me-1"></i> Aggiorna'; }

        if (!res || !res.ok) {
          container.innerHTML = `<div class="alert alert-danger small mb-0">${this.escapeHtml((res && res.error) || 'Errore sconosciuto')}</div>`;
          return;
        }

        // Info rimorchio in alto
        if (infoEl && res.trailerParams) {
          const p = res.trailerParams;
          const remKgPct = p.maxWeight > 0 ? Math.round((p.remainingKg / p.maxWeight) * 100) : 100;
          const warnClass = remKgPct < 20 ? ' ptr-warn' : '';
          infoEl.innerHTML = `
            <span class="ptr-pill">Max ${(p.maxWeight || 0).toLocaleString('it')} kg</span>
            <span class="ptr-pill${warnClass}">Residuo: <b>${(p.remainingKg || 0).toLocaleString('it')} kg</b> (${remKgPct}%)</span>
            <span class="ptr-pill">L max ${p.maxLen || '—'} m</span>
            ${p.isCassonato ? '<span class="ptr-pill" style="background:#dcfce7;color:#14532d;border-color:#86efac">Cassonato</span>' : ''}
          `;
        }

        const suggestions = res.suggestions || [];
        if (!suggestions.length) {
          container.innerHTML = '<div class="alert alert-info small mb-0">Nessun materiale compatibile trovato nel magazzino.</div>';
          return;
        }

        const n = suggestions.length;
        container.innerHTML = '';

        suggestions.forEach((item, idx) => {
          const kg = Number(item.KG || item.kg || 0);
          const dest = String(item.Destinazione || '').trim();
          const cliente = String(item.Cliente || '').trim();
          const materiale = String(item.Materiale || '—').trim();
          const tipoMerce = String(item['Tipo Merce'] || item.TipoMerce || '').trim();
          const nave = String(item['Tratta Nave ID'] || '').trim();
          const stato = String(item.Stato || '').trim();

          const tassRaw = item['Data Tassativa'] || item.DataTassativa;
          let tassLabel = '';
          let tassWarn = false;
          if (tassRaw) {
            const d = new Date(tassRaw);
            if (!isNaN(d.getTime())) {
              const days = Math.floor((d.getTime() - Date.now()) / 86400000);
              tassLabel = d.toLocaleDateString('it');
              tassWarn = days <= 3;
            }
          }

          // Classe priorità per bordo sinistro
          const pctIdx = idx / n;
          const prioClass = pctIdx < 0.33 ? 'pairing-top' : pctIdx < 0.66 ? 'pairing-mid' : 'pairing-low';

          // Lunghezza
          const lenVal = Number(item['Lunghezza (m)'] || item.Lunghezza_m || 0);

          const div = document.createElement('div');
          div.className = `pairing-item ${prioClass}`;
          div.innerHTML = `
            <div class="pairing-body">
              <div class="pairing-title">${this.escapeHtml(materiale)}</div>
              <div class="pairing-meta">
                ${cliente ? `<b>${this.escapeHtml(cliente)}</b> → ` : ''}${this.escapeHtml(dest || '—')}
                ${stato ? `<span class="ms-2 badge bg-secondary" style="font-size:.68rem">${this.escapeHtml(stato)}</span>` : ''}
              </div>
              <div class="pairing-pills mt-1">
                ${kg ? `<span class="pairing-pill pp-kg">${kg.toLocaleString('it')} kg</span>` : ''}
                ${tipoMerce ? `<span class="pairing-pill pp-tipo">${this.escapeHtml(tipoMerce)}</span>` : ''}
                ${tassLabel ? `<span class="pairing-pill pp-tass${tassWarn ? ' border-danger' : ''}" title="Data tassativa">${tassWarn ? '⚠ ' : ''}${tassLabel}</span>` : ''}
                ${dest ? `<span class="pairing-pill pp-dest">${this.escapeHtml(dest)}</span>` : ''}
                ${lenVal ? `<span class="pairing-pill">L ${lenVal} m</span>` : ''}
                ${nave ? `<span class="pairing-pill">Nave: ${this.escapeHtml(nave)}</span>` : ''}
              </div>
            </div>
            <div class="pairing-load-btn">
              <button class="btn btn-sm btn-outline-success" onclick="app.aiLoadItem('${this.escapeJs(String(item.ID || ''))}')">
                <i class="fas fa-truck-loading"></i> Carica
              </button>
            </div>
          `;
          container.appendChild(div);
        });
      })
      .withFailureHandler((err) => {
        if (btnRefresh) { btnRefresh.disabled = false; btnRefresh.innerHTML = '<i class="fas fa-sync-alt me-1"></i> Aggiorna'; }
        container.innerHTML = `<div class="alert alert-danger small mb-0">Errore: ${this.escapeHtml(String(err))}</div>`;
      })
      .api_suggestLoadPairings(targa);
  },

  uploadDdtFiles: function() {
    const targa = this.state.currentTrailer;
    const input = document.getElementById('det-ddt-file-input');
    const statusEl = document.getElementById('det-ddt-upload-status');
    if (!targa) { Swal.fire('Attenzione', 'Apri prima i dettagli di un rimorchio.', 'warning'); return; }
    if (!input || !input.files || !input.files.length) {
      Swal.fire('Attenzione', 'Seleziona almeno un file (foto o PDF) della bolla da caricare.', 'warning');
      return;
    }

    const files = Array.from(input.files);
    const allowed = ['application/pdf','image/jpeg','image/jpg','image/png','image/webp'];
    for (const f of files) {
      if (allowed.indexOf(f.type) === -1) {
        Swal.fire('Errore', `Formato non supportato: ${f.name}. Usa PDF, JPG, PNG o WEBP.`, 'error');
        return;
      }
    }

    if (statusEl) {
      statusEl.style.display = '';
      statusEl.innerHTML = `<i class="fas fa-spinner fa-spin me-1"></i>Caricamento 0/${files.length}...`;
    }

    const self = this;
    let uploaded = 0;

    const uploadNext = (idx) => {
      if (idx >= files.length) {
        if (statusEl) {
          statusEl.innerHTML = `<span class="text-success"><i class="fas fa-check-circle me-1"></i>${uploaded}/${files.length} file caricati</span>`;
          setTimeout(() => { statusEl.style.display = 'none'; }, 2500);
        }
        input.value = '';
        self.loadDdtList();
        return;
      }
      const file = files[idx];
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = String(e.target.result || '').split(',')[1] || '';
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              uploaded++;
            } else {
              Swal.fire('Errore', (res && res.error) ? res.error : `Errore durante il caricamento di ${file.name}`, 'error');
            }
            if (statusEl) statusEl.innerHTML = `<i class="fas fa-spinner fa-spin me-1"></i>Caricamento ${idx+1}/${files.length}...`;
            uploadNext(idx + 1);
          })
          .withFailureHandler((err) => {
            Swal.fire('Errore', `Errore di rete durante il caricamento di ${file.name}: ${err}`, 'error');
            uploadNext(idx + 1);
          })
          .api_uploadDdt(targa, file.name, base64, file.type || 'application/pdf');
      };
      reader.onerror = function() {
        Swal.fire('Errore', `Impossibile leggere il file ${file.name}`, 'error');
        uploadNext(idx + 1);
      };
      reader.readAsDataURL(file);
    };

    uploadNext(0);
  },

    // Autista opzionale: se mancante chiede ma permette di continuare
    const proceedWithTrip = () => {
Swal.fire({
      title: 'Inizio viaggio',
      html,
      showCancelButton: true,

      cancelButtonText: 'Cancel',
      didOpen: () => {

  /* ======================= HELPERS ======================= */
  formatDateTime_: function(v) {
    if (!v) return '';
    if (typeof v === 'string') {
      // ISO: "2025-03-15T00:00:00.000Z" -> parse as local date
      const m = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) {
        const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
        if (!isNaN(d.getTime())) return d.toLocaleDateString('it-IT');
      }
    }
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v);
    return d.toLocaleDateString('it-IT');
  },

  
  statoNorm_: function(stato) {
    const s = String(stato || '').trim().toUpperCase();
    return s ? s : 'VUOTO';
  },


  posNorm_: function(pos) {
    const p = String(this.safeField_(pos, '') || '').trim();
    return p ? p : 'Sconosciuto';
  },

  portoNorm_: function(pos) {
    const p = String(this.safeField_(pos, '') || '').trim();
    const m = p.match(/\(\s*([A-Z0-9]{2,6})\s*=\s*([^)]+)\)/);
    if (m) return `(${m[1]}= ${m[2].trim()})`;
    return 'Sconosciuto';
  },

  autistaNorm_: function(trattore, rimorchio) {
    // 1) Priorità: autista assegnato direttamente al rimorchio (Carico > Giacenza > Scarico)
    if (rimorchio) {
      const direct = String(
        rimorchio['Autista Carico'] || rimorchio['Autista Giacenza'] || rimorchio['Autista Scarico'] || ''
      ).trim();
      if (direct) return direct;
    }
    // 2) Fallback: autista dal trattore agganciato (foglio Mezzi)
    const tratt = String(trattore || '').trim();
    if (!tratt) return 'Nessun autista';
    const mzz = (this.data.mezzi || []).find(x => String(x.Targa || '').trim() === tratt);
    const a = mzz ? String(mzz.Autista || '').trim() : '';
    return a ? a : 'Nessun autista';
  },

escapeHtml: function(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  },
  renderTipoMerceOptions_: function(selected) {
    const opts = [
      { v: '', t: 'Seleziona...' },
      { v: 'GENERICO', t: 'Generico' },
      { v: 'MACCHINARIO', t: 'Macchinario' },
      { v: 'SFUSO', t: 'Merce sfusa (frumento)' },
      { v: 'LAMIERA', t: 'Lamiera' },
      { v: 'TUBI', t: 'Tubi' },
      { v: 'BOBINE', t: 'Nastri / Bobine' },
      { v: 'PEDANE', t: 'Pedane' },
      { v: 'ALTRO', t: 'Altro' }
    ];
    const sel = String(selected || '').trim().toUpperCase();
    return opts.map(o => {
      const s = (o.v && o.v === sel) ? ' selected' : '';
      return `<option value="${this.escapeHtml(o.v)}"${s}>${this.escapeHtml(o.t)}</option>`;
    }).join('');
  },
  // Sanitizza campi testuali provenienti da fogli (evita che contenuti incollati/errati "sporchino" la UI)
  safeField_: function(v, fallback) {
    const s = String(v == null ? '' : v).trim();
    const fb = (fallback == null) ? '' : String(fallback);
    if (!s) return fb;
    // blocca contenuti chiaramente non pertinenti (codice JS/HTML incollato per errore)
    const bad = [
      'google.script.run', 'function(', '$(document)', '<scr'+'ipt', '</scr'+'ipt', 'ClientJS', 'renderManualTrip',
      'BEGIN:VEVENT', 'api_'
    ];
    const lower = s.toLowerCase();
    if (s.length > 80 && bad.some(x => lower.includes(String(x).toLowerCase()))) return fb;
    // limita lunghezze anomale (es. paste accidentale)
    if (s.length > 220) return s.slice(0, 220) + '…';
    return s;
  },




  escapeJs: function(str) {
    return String(str ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '\\"')
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r');
  },

  renderCargoView: function() {
    const tbody = document.querySelector('#table-cargo-view tbody');
    if (!tbody) return;
    const esc = (s)=> this.escapeHtml(String(s||''));
    const rows = (this.data && this.data.trailers) ? this.data.trailers : [];
    const only = rows.filter(r => String(r.Stato||'').toUpperCase()==='CARICO' || (r.Carico && String(r.Carico).trim().length>2));
    tbody.innerHTML = only.map(r=>{
      const cargoObj = (typeof r.Carico === 'string') ? this.safeParseJson_(r.Carico) : (r.Carico||null);

  toInputDate_: function(v) {
    if (!v) return '';
    // Gestisce ISO string da Google Sheets (es. "2025-03-15T00:00:00.000Z")
    if (typeof v === 'string') {
      const m = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
    }
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v).slice(0, 10);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  },

/* ============================
 * INLINE EDIT (v22)
 * - Attiva modifica inline per elementi con:
 *   data-entity="RIMORCHI|VIAGGI|MEZZI|NAVI" data-id="..." data-field="..."
 * - Non rompe UI esistente: se gli attributi non ci sono, non fa nulla.
 * ============================ */
(function(){
  try {
    const doc = document;

    function toast(msg){ try{ window.appToast && window.appToast(msg); } catch(e){} }

    function runInlineUpdate(el, value) {
      const entity = el.getAttribute("data-entity");
      const id = el.getAttribute("data-id");
      const field = el.getAttribute("data-field");
      if (!entity || !id || !field) return;

      google.script.run
        .withSuccessHandler((res)=>{
          if (!res || !res.ok) {
            toast((res && (res.error || (res.errors && res.errors.join(", ")))) || "Aggiornamento fallito");
          } else {
            toast("Salvato");
          }
        })
        .withFailureHandler((err)=>{
          toast("Errore salvataggio: " + (err && err.message ? err.message : err));
        })
        .api_inlineUpdate(entity, id, field, value);
    }

    // input/select/textarea -> blur
    doc.addEventListener("blur", function(ev){
      const el = ev.target;
      if (!el) return;
      if (!(el.matches && el.matches("input, textarea, select"))) return;
      if (!el.hasAttribute("data-entity")) return;
      runInlineUpdate(el, el.value);
    }, true);

    // td contenteditable -> blur
    doc.addEventListener("dblclick", function(ev){
      const td = ev.target && ev.target.closest ? ev.target.closest("td[data-entity][data-id][data-field]") : null;
      if (!td) return;
      if (td.getAttribute("contenteditable")==="true") return;
      td.setAttribute("contenteditable","true");
      td.focus();
      // seleziona testo
      try {
        const sel = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(td);
        sel.removeAllRanges();
        sel.addRange(range);
      } catch(e){}
    }, true);

    doc.addEventListener("blur", function(ev){
      const td = ev.target;
      if (!td) return;
      if (!(td.matches && td.matches("td[contenteditable='true'][data-entity][data-id][data-field]"))) return;
      td.setAttribute("contenteditable","false");
      runInlineUpdate(td, td.textContent.trim());
    }, true);

    // ESC annulla contenteditable
    doc.addEventListener("keydown", function(ev){
      const td = ev.target;
      if (ev.key !== "Escape") return;
      if (!(td && td.matches && td.matches("td[contenteditable='true'][data-entity][data-id][data-field]"))) return;
      td.setAttribute("contenteditable","false");
      td.blur();
    }, true);

  } catch(e) {}
})();
